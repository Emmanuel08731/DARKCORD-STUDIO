<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKCORD STUDIO | ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #5865F2; --bg: #000000; --c: #111111; --t: #ffffff; --td: #888888; --b: rgba(255,255,255,0.05); }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        body { background:var(--bg); color:var(--t); overflow-x:hidden; }
        .glow { position:fixed; top:0; left:50%; width:100%; height:400px; background:radial-gradient(circle at center, rgba(88,101,242,0.1), transparent 70%); transform:translateX(-50%); z-index:-1; }

        nav { position:fixed; top:0; width:100%; height:80px; background:rgba(0,0,0,0.8); backdrop-filter:blur(20px); display:flex; justify-content:space-between; align-items:center; padding:0 8%; z-index:1000; border-bottom:1px solid var(--b); }
        .logo { font-family:'Syncopate'; font-size:0.8rem; letter-spacing:5px; color:var(--p); font-weight:800; }

        .btn-p { background:var(--p); color:white; border:none; padding:12px 25px; border-radius:12px; font-weight:800; cursor:pointer; transition:0.3s; }
        .btn-p:hover { transform:scale(1.05); box-shadow: 0 0 20px rgba(88,101,242,0.3); }

        .hero { padding:180px 5% 60px; text-align:center; }
        .hero h1 { font-size:4.5rem; letter-spacing:-4px; line-height:1; margin-bottom:15px; }
        .hero span { color:var(--p); }

        .grid { padding:20px 8%; display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:25px; }
        .card { background:var(--c); padding:40px; border-radius:30px; border:1px solid var(--b); transition:0.4s; }
        .card:hover { border-color:var(--p); transform:translateY(-5px); }
        .price { font-size:2.5rem; font-weight:800; color:var(--p); margin:15px 0; }

        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(15px); display:none; align-items:center; justify-content:center; z-index:2000; }
        .modal-c { background:#0a0a0a; width:90%; max-width:400px; padding:40px; border-radius:30px; border:1px solid var(--b); text-align:center; }
        input { width:100%; padding:15px; margin-bottom:10px; border-radius:12px; background:#151515; border:1px solid var(--b); color:white; }
        input:focus { border-color:var(--p); outline:none; }

        .profile-area { position:relative; display:none; align-items:center; gap:10px; cursor:pointer; }
        .drop { position:absolute; top:60px; right:0; width:220px; background:#111; border-radius:15px; border:1px solid var(--b); display:none; flex-direction:column; padding:10px; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .drop.active { display:flex; }
        .drop-b { padding:12px; border-radius:8px; text-align:left; background:none; border:none; color:var(--td); cursor:pointer; font-weight:600; }
        .drop-b:hover { background:var(--p); color:white; }
    </style>
</head>
<body>

    <div class="glow"></div>
    <nav>
        <div class="logo">DARKCORD STUDIO</div>
        <div id="nav-auth"><button class="btn-p" onclick="openM('auth-m')">ACCEDER</button></div>
        <div class="profile-area" id="nav-user" onclick="toggleD()">
            <span id="user-display" style="font-weight:800; font-size:0.8rem;">USUARIO</span>
            <div style="width:35px; height:35px; background:var(--p); border-radius:10px;"></div>
            <div class="drop" id="user-drop">
                <button class="drop-b" id="staff-btn" style="display:none;" onclick="openM('admin-m')">STAFF PANEL</button>
                <button class="drop-b" onclick="location.reload()" style="color:#ff4d4d;">LOGOUT</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>DARK <span>STUDIO</span> STORE</h1>
        <p style="color:var(--td); margin-top:10px;">Plataforma élite de activos digitales.</p>
    </header>

    <div class="grid" id="main-grid"></div>

    <div class="modal" id="auth-m">
        <div class="modal-c">
            <h2 id="modal-t" style="margin-bottom:20px;">Welcome</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-p" style="width:100%; margin-top:10px;" onclick="handleAuth()">CONTINUAR</button>
            <p style="margin-top:20px; font-size:0.8rem; color:var(--td);">
                <span id="switch-msg">¿No tienes cuenta?</span> 
                <a href="#" onclick="switchAuth()" style="color:var(--p); text-decoration:none; font-weight:800;">Haz clic aquí</a>
            </p>
        </div>
    </div>

    <div class="modal" id="admin-m">
        <div class="modal-c">
            <h2>Add Stock</h2>
            <input type="text" id="p-name" placeholder="Nombre">
            <input type="number" id="p-price" placeholder="Precio">
            <button class="btn-p" style="width:100%;" onclick="addStock()">PUBLICAR</button>
            <button onclick="closeM('admin-m')" style="margin-top:15px; background:none; border:none; color:var(--td); cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script>
        let isLogin = true;
        window.onload = loadItems;

        async function loadItems() {
            try {
                const res = await fetch('/api/stock');
                const data = await res.json();
                const grid = document.getElementById('main-grid');
                grid.innerHTML = data.length ? data.map(p => `
                    <div class="card">
                        <h3>${p.nombre}</h3>
                        <div class="price">${p.precio} R$</div>
                        <button class="btn-p" style="width:100%; background:#222;">ADQUIRIR</button>
                    </div>
                `).join('') : '<p style="grid-column:1/-1; text-align:center; opacity:0.3;">SIN STOCK</p>';
            } catch(e) { console.error("Error cargando stock"); }
        }

        function switchAuth() {
            isLogin = !isLogin;
            document.getElementById('modal-t').innerText = isLogin ? 'Welcome' : 'Register';
            document.getElementById('switch-msg').innerText = isLogin ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const route = isLogin ? '/api/login' : '/api/register';

            try {
                const res = await fetch(route, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    if (!isLogin) {
                        alert("¡Cuenta creada! Inicia sesión.");
                        switchAuth();
                    } else {
                        // LOGIN EXITOSO
                        document.getElementById('nav-auth').style.display = 'none';
                        document.getElementById('nav-user').style.display = 'flex';
                        document.getElementById('user-display').innerText = email.split('@')[0].toUpperCase();
                        if (email === 'admin@emmanuel.com') document.getElementById('staff-btn').style.display = 'block';
                        closeM('auth-m');
                    }
                } else {
                    alert(data.error || "Error en los datos");
                }
            } catch (e) {
                alert("Servidor no responde. Intenta de nuevo en 10 segundos.");
            }
        }

        async function addStock() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            await fetch('/api/stock', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, price })
            });
            location.reload();
        }

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }
        function toggleD() { document.getElementById('user-drop').classList.toggle('active'); }
    </script>
</body>
</html>
