<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecnhaca | Streaming Premium</title>
    <style>
        :root {
            --blue: #00a8ff;
            --dark: #060d17;
            --card: #101a2d;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* Animación de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animated { animation: fadeIn 0.8s ease forwards; }

        /* --- PANTALLA DE LOGIN --- */
        #auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(rgba(6, 13, 23, 0.8), rgba(6, 13, 23, 0.8)), 
                        url('https://source.unsplash.com/random/1920x1080?movie');
            background-size: cover;
        }

        .auth-card {
            background: var(--card);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 168, 255, 0.2);
        }

        h1 { color: var(--blue); letter-spacing: 3px; margin-bottom: 5px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border-radius: 5px; border: none; background: #1d2a41; color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%; padding: 12px; background: var(--blue);
            color: var(--dark); border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #00d2ff; transform: scale(1.02); }

        /* --- MENÚ PRINCIPAL (PANTALLA POST-LOGIN) --- */
        #main-menu { display: none; padding: 20px; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5%; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--blue);
        }

        .profile-icon {
            width: 45px; height: 45px; background: var(--blue);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; font-weight: bold; color: var(--dark);
        }

        /* Dropdown de cuenta */
        #account-dropdown {
            display: none; position: absolute; right: 5%; top: 75px;
            background: var(--card); padding: 20px; border-radius: 10px;
            border: 1px solid var(--blue); z-index: 100;
        }

        /* PAQUETES */
        .packages-container {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 50px;
        }
        .package-card {
            background: var(--card); padding: 30px; border-radius: 15px;
            width: 250px; text-align: center; border: 1px solid #1d2a41;
            transition: 0.4s;
        }
        .package-card:hover { border-color: var(--blue); transform: translateY(-10px); }
        .price { font-size: 2rem; color: var(--blue); margin: 15px 0; }

        .hidden { display: none; }
        #status-msg { margin-bottom: 15px; font-weight: bold; color: #00ff88; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card animated">
            <h1>ECNHACA</h1>
            <div id="status-msg"></div>

            <div id="login-form">
                <input type="email" id="l-email" placeholder="Email">
                <input type="password" id="l-pass" placeholder="Contraseña">
                <button onclick="auth('/auth/login', 'l')">INICIAR SESIÓN</button>
                <p onclick="toggle()" style="cursor:pointer; font-size: 0.8rem;">¿No tienes cuenta? Crear una</p>
            </div>

            <div id="reg-form" class="hidden">
                <input type="text" id="r-name" placeholder="Tu nombre">
                <input type="email" id="r-email" placeholder="Email">
                <input type="password" id="r-pass" placeholder="Contraseña">
                <button onclick="auth('/auth/register', 'r')">REGISTRARME</button>
                <p onclick="toggle()" style="cursor:pointer; font-size: 0.8rem;">Ya tengo cuenta. Entrar</p>
            </div>
        </div>
    </div>

    <div id="main-menu">
        <nav>
            <h2>ECNHACA</h2>
            <div class="profile-icon" onclick="toggleAccount()">👤</div>
        </nav>

        <div id="account-dropdown" class="animated">
            <h3 id="user-display-name">Usuario</h3>
            <p style="font-size: 0.8rem; color: #8892b0;">Cuenta Estándar</p>
            <hr border="0" style="border-top: 1px solid #1d2a41;">
            <button onclick="location.reload()" style="background:transparent; color:white; border: 1px solid red;">Cerrar Sesión</button>
        </div>

        <div class="packages-container">
            <div class="package-card animated">
                <h3>Básico</h3>
                <div class="price">$5.99</div>
                <p>1 Pantalla • HD</p>
                <button>Elegir</button>
            </div>
            <div class="package-card animated" style="border-color: var(--blue);">
                <h3>Premium</h3>
                <div class="price">$9.99</div>
                <p>4 Pantallas • 4K + HDR</p>
                <button>Elegir</button>
            </div>
            <div class="package-card animated">
                <h3>Familiar</h3>
                <div class="price">$14.99</div>
                <p>6 Pantallas • 4K + Niños</p>
                <button>Elegir</button>
            </div>
        </div>
    </div>

    <script>
        const status = document.getElementById('status-msg');

        function toggle() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('reg-form').classList.toggle('hidden');
            status.textContent = "";
        }

        function toggleAccount() {
            const drop = document.getElementById('account-dropdown');
            drop.style.display = drop.style.display === 'block' ? 'none' : 'block';
        }

        async function auth(url, p) {
            const body = {
                email: document.getElementById(`${p}-email`).value,
                password: document.getElementById(`${p}-pass`).value
            };
            if(p === 'r') body.nombre = document.getElementById('r-name').value;

            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            const data = await res.json();

            if(res.ok) {
                status.textContent = data.message;
                status.style.color = "#00ff88";
                
                if(url.includes('login')) {
                    setTimeout(() => {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-menu').style.display = 'block';
                        document.getElementById('user-display-name').textContent = data.nombre;
                    }, 1000);
                } else {
                    setTimeout(toggle, 1500);
                }
            } else {
                status.textContent = data.error;
                status.style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
