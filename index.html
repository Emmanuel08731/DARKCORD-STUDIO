<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMMANUEL STORE | OFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0071e3;
            --bg: #ffffff;
            --surface: #f5f5f7;
            --text: #1d1d1f;
            --border: rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Navegación */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 1000; border-bottom: 1px solid var(--border);
        }

        .logo { font-family: 'Syncopate'; font-size: 0.8rem; letter-spacing: 5px; font-weight: 700; }

        /* Sección de Usuario / Perfil */
        .user-section { position: relative; }
        .user-pill {
            background: var(--surface); padding: 10px 22px; border-radius: 50px;
            cursor: pointer; font-weight: 800; display: flex; align-items: center; gap: 10px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .user-pill:hover { background: #e8e8ed; }

        .dropdown {
            position: absolute; top: 60px; right: 0; width: 280px;
            background: #fff; border-radius: 22px; box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            border: 1px solid var(--border); display: none; flex-direction: column; padding: 15px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .dropdown.active { display: flex; }
        .dropdown-header { padding: 12px; border-bottom: 1px solid var(--surface); margin-bottom: 10px; }
        .dropdown-btn {
            padding: 12px; border-radius: 12px; text-align: left; background: none;
            border: none; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 0.9rem;
        }
        .dropdown-btn:hover { background: var(--surface); }

        /* Modales */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-content { 
            background: #fff; width: 90%; max-width: 500px; padding: 40px; 
            border-radius: 32px; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        /* Tienda Estilo Apple */
        .hero { padding: 160px 5% 60px; text-align: center; }
        .hero h1 { font-size: 3.5rem; letter-spacing: -2px; font-weight: 800; margin-bottom: 10px; }
        
        .catalog { 
            padding: 40px 5%; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; 
        }
        .card { 
            background: var(--surface); padding: 40px; border-radius: 28px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent;
        }
        .card:hover { transform: scale(1.02); background: #fff; border-color: var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .card h3 { font-size: 1.4rem; margin-bottom: 10px; }

        /* Admin UI */
        .admin-tag { background: #eef6ff; color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; }
        .search-input { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid var(--border); margin: 20px 0; background: var(--surface); }
        .user-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--surface); font-size: 0.9rem; }

        .btn-black { background: #000; color: #fff; border: none; padding: 15px; border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">EMMANUEL STORE</div>
        
        <div id="auth-section">
            <button class="user-pill" onclick="openModal('login-modal')">INICIAR SESIÓN</button>
        </div>

        <div class="user-section" id="profile-section" style="display: none;">
            <div class="user-pill" onclick="toggleDropdown()">
                <div style="background: var(--accent); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;">E</div>
                <span id="user-name-display">Cargando...</span>
            </div>
            <div class="dropdown" id="user-dropdown">
                <div class="dropdown-header">
                    <p id="user-email-display" style="font-weight: 800;"></p>
                    <span id="admin-label" class="admin-tag" style="display: none; margin-top: 5px; display: inline-block;">ADMINISTRADOR</span>
                </div>
                <button class="dropdown-btn" id="admin-panel-btn" style="display: none; color: var(--accent);" onclick="openModal('admin-modal')">Panel de Control</button>
                <button class="dropdown-btn" onclick="logout()" style="color: #ff3b30;">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>Emmanuel Store.</h1>
        <p style="color: #86868b; font-size: 1.2rem;">Calidad premium en cada cuenta digital.</p>
    </header>

    <main class="catalog" id="product-grid"></main>

    <div class="modal" id="login-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 25px; letter-spacing: -1px;">Identifícate</h2>
            <input type="email" id="in-email" placeholder="Correo electrónico" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid var(--border);">
            <input type="password" id="in-pass" placeholder="Contraseña" style="width:100%; padding:15px; margin-bottom:20px; border-radius:12px; border:1px solid var(--border);">
            <button class="btn-black" onclick="login()">ENTRAR</button>
            <p onclick="closeModal('login-modal')" style="text-align:center; margin-top:20px; cursor:pointer; color:#86868b; font-size:0.9rem;">Cancelar</p>
        </div>
    </div>

    <div class="modal" id="admin-modal">
        <div class="modal-content" style="max-width: 600px;">
            <h2 style="margin-bottom: 10px;">Panel Administrativo</h2>
            
            <input type="text" class="search-input" id="user-search" placeholder="Buscar usuarios registrados..." onkeyup="filterUsers()">
            <div id="users-list" style="max-height: 200px; overflow-y: auto; margin-bottom: 30px;">
                </div>

            <h3 style="margin-bottom: 15px;">Gestión de Inventario</h3>
            <input type="text" id="new-prod-name" placeholder="Nombre del producto" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid var(--border);">
            <input type="number" id="new-prod-price" placeholder="Precio (R$)" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:1px solid var(--border);">
            <button class="btn-black" style="background: var(--accent);" onclick="addStock()">AÑADIR AL STOCK</button>
            <button class="btn-black" style="background:#eee; color:#000; margin-top:10px;" onclick="closeModal('admin-modal')">CERRAR</button>
        </div>
    </div>

    <script>
        // --- DATOS INICIALES ---
        let products = [
            { id: 1, name: "Suscripción Premium", price: 1500 },
            { id: 2, name: "Pack Recursos Dev", price: 800 }
        ];

        let registeredUsers = []; // Se llenará desde el Backend

        // --- FUNCIONES DE SESIÓN ---
        async function login() {
            const email = document.getElementById('in-email').value;
            const pass = document.getElementById('in-pass').value;

            // CUENTA ADMIN POR DEFECTO
            if(email === 'admin@emmanuel.com' && pass === 'admin123') {
                showUser({ email: 'admin@emmanuel.com', role: 'admin' });
            } else {
                alert("Usuario no reconocido o requiere conexión a Base de Datos");
            }
        }

        function showUser(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('profile-section').style.display = 'block';
            document.getElementById('user-name-display').innerText = user.email.split('@')[0].toUpperCase();
            document.getElementById('user-email-display').innerText = user.email;
            
            if(user.role === 'admin') {
                document.getElementById('admin-label').style.display = 'inline-block';
                document.getElementById('admin-panel-btn').style.display = 'block';
            }
            closeModal('login-modal');
            loadUsersFromDB(); // Intentar cargar usuarios reales
        }

        function logout() { location.reload(); }

        // --- FUNCIONES DE TIENDA ---
        function renderStore() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <h3>${p.name}</h3>
                    <p style="font-weight: 800; font-size: 1.8rem; margin: 20px 0;">${p.price} R$</p>
                    <button class="btn-black" onclick="alert('Pedido enviado')">COMPRAR AHORA</button>
                </div>
            `).join('');
        }

        // --- FUNCIONES ADMIN (CONEXIÓN BACKEND) ---
        async function loadUsersFromDB() {
            try {
                // Detecta automáticamente si usa localhost o la URL de Render
                const response = await fetch('/api/users');
                if(response.ok) {
                    registeredUsers = await response.json();
                    renderUserList(registeredUsers);
                }
            } catch (err) {
                console.log("Servidor Backend no detectado aún.");
            }
        }

        function renderUserList(list) {
            const container = document.getElementById('users-list');
            container.innerHTML = list.map(u => `
                <div class="user-row">
                    <span>${u.email}</span>
                    <span style="color: #86868b; font-size: 0.7rem;">ID: ${u.id || 'N/A'}</span>
                </div>
            `).join('');
        }

        function filterUsers() {
            const val = document.getElementById('user-search').value.toLowerCase();
            const filtered = registeredUsers.filter(u => u.email.toLowerCase().includes(val));
            renderUserList(filtered);
        }

        function addStock() {
            const name = document.getElementById('new-prod-name').value;
            const price = document.getElementById('new-prod-price').value;
            if(!name || !price) return alert("Completa los datos");

            products.push({ id: Date.now(), name, price });
            renderStore();
            alert("¡Stock actualizado!");
        }

        // --- UTILIDADES ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleDropdown() { document.getElementById('user-dropdown').classList.toggle('active'); }

        // Inicializar
        renderStore();
    </script>
</body>
</html>
