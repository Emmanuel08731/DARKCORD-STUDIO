<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKCORD STUDIO | ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #5865F2; 
            --bg: #020203; 
            --card: rgba(255, 255, 255, 0.03); 
            --t: #ffffff; 
            --td: #9494a3; 
            --b: rgba(255,255,255,0.1); 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); overflow-x: hidden; min-height: 100vh; }
        
        /* Efectos de fondo */
        .glow { position: fixed; top: -150px; left: 50%; width: 800px; height: 600px; background: radial-gradient(circle, rgba(88,101,242,0.2), transparent 70%); transform: translateX(-50%); z-index: -1; }

        nav { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            background: rgba(2,2,3,0.7); backdrop-filter: blur(25px); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 8%; z-index: 1000; border-bottom: 1px solid var(--b);
        }
        .logo { font-family: 'Syncopate'; font-size: 0.9rem; letter-spacing: 6px; color: var(--p); font-weight: 800; }

        /* Botones Estilizados */
        .btn-p { 
            background: var(--p); color: white; border: none; padding: 12px 28px; 
            border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .btn-p:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 10px 25px rgba(88,101,242,0.5); }

        /* Hero Section */
        .hero { padding: 180px 5% 40px; text-align: center; animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hero h1 { font-size: 5rem; font-weight: 800; letter-spacing: -5px; line-height: 1; margin-bottom: 15px; }
        .hero span { color: var(--p); text-shadow: 0 0 30px rgba(88,101,242,0.3); }
        
        /* Grid de Productos */
        .grid { padding: 40px 8%; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { 
            background: var(--card); padding: 45px; border-radius: 35px; border: 1px solid var(--b); 
            transition: 0.4s; position: relative; overflow: hidden; backdrop-filter: blur(10px);
        }
        .card:hover { border-color: var(--p); background: rgba(255,255,255,0.06); transform: translateY(-10px); }
        .price { font-size: 2.8rem; font-weight: 800; color: var(--p); margin: 20px 0; letter-spacing: -2px; }

        /* Modales Elite */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-c { background: #0a0a0c; width: 95%; max-width: 420px; padding: 50px; border-radius: 40px; border: 1px solid var(--b); text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 16px; background: #141416; border: 1px solid var(--b); color: white; font-size: 1.1rem; transition: 0.3s; }
        input:focus { border-color: var(--p); outline: none; background: #1c1c1f; }

        /* Perfil Dropdown Intuitivo */
        .user-section { position: relative; display: flex; align-items: center; }
        .profile-trigger { display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 8px 18px; border-radius: 16px; background: var(--card); border: 1px solid var(--b); transition: 0.3s; }
        .profile-trigger:hover { background: rgba(255,255,255,0.1); }
        
        .drop { 
            position: absolute; top: 70px; right: 0; width: 260px; background: #0f0f12; 
            border-radius: 24px; border: 1px solid var(--b); display: none; flex-direction: column; 
            padding: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); animation: slideDown 0.3s ease; 
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .drop.active { display: flex; }
        .drop-b { padding: 15px; border-radius: 14px; text-align: left; background: none; border: none; color: var(--td); cursor: pointer; font-weight: 700; transition: 0.2s; }
        .drop-b:hover { background: rgba(255,255,255,0.05); color: white; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <nav>
        <div class="logo">DARKCORD STUDIO</div>
        <div class="user-section">
            <button class="btn-p" id="nav-login-btn" onclick="openM('auth-m')">IDENTIFICARSE</button>
            
            <div id="user-profile" style="display: none;" onclick="toggleD()">
                <div class="profile-trigger">
                    <span id="u-name" style="font-weight: 800; font-size: 0.9rem;">CARGANDO...</span>
                    <div style="width:35px; height:35px; background: linear-gradient(45deg, var(--p), #8a94f8); border-radius:10px; box-shadow: 0 4px 15px rgba(88,101,242,0.4);"></div>
                </div>
                <div class="drop" id="u-drop">
                    <div style="padding: 10px; border-bottom: 1px solid var(--b); margin-bottom: 10px; font-size: 0.7rem; color: var(--td);">CONTROLES DE CUENTA</div>
                    <button class="drop-b" id="adm-b" style="display:none; color:var(--p);" onclick="openM('adm-m')">✨ PANEL STAFF</button>
                    <button class="drop-b" onclick="location.reload()" style="color:#ff5555;">CERRAR SESIÓN</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>DIGITAL <span>ELITE</span> ASSETS</h1>
        <p style="color:var(--td); margin-top: 20px;">Acceso exclusivo a licencias, cuentas y recursos premium verificados.</p>
    </header>

    <div class="grid" id="grid"></div>

    <div class="modal" id="auth-m">
        <div class="modal-c">
            <h2 id="at" style="margin-bottom: 30px; font-size: 2.2rem; letter-spacing: -2px;">Welcome</h2>
            <input type="email" id="ae" placeholder="Email Address">
            <input type="password" id="ap" placeholder="Secret Password">
            <button class="btn-p" style="width:100%; padding:20px; font-size: 1rem;" onclick="auth()">CONTINUAR ACCESO</button>
            <p style="margin-top:25px; font-size:0.9rem; color:var(--td);">
                <span id="as">¿Eres nuevo aquí?</span> <br>
                <a href="#" onclick="sw()" style="color:var(--p); text-decoration:none; font-weight: 800; border-bottom: 1px solid var(--p);">Crea una cuenta ahora</a>
            </p>
            <button onclick="closeM('auth-m')" style="margin-top: 20px; background: none; border: none; color: var(--b); cursor: pointer;">Cerrar</button>
        </div>
    </div>

    <div class="modal" id="adm-m">
        <div class="modal-c">
            <h2 style="margin-bottom:25px; color: var(--p);">Staff Control</h2>
            <input type="text" id="pn" placeholder="Nombre del Servicio">
            <input type="number" id="pp" placeholder="Precio (R$)">
            <button class="btn-p" style="width:100%;" onclick="add()">PUBLICAR EN TIENDA</button>
            <button onclick="closeM('adm-m')" style="margin-top:20px; background:none; border:none; color:var(--td); cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        let isL = true;
        window.onload = load;

        async function load() {
            try {
                const res = await fetch('/api/stock');
                const data = await res.json();
                const grid = document.getElementById('grid');
                if(data.length === 0) {
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; opacity:0.3; padding: 100px;">CATÁLOGO VACÍO</p>';
                } else {
                    grid.innerHTML = data.map(p => `
                        <div class="card">
                            <h3>${p.nombre}</h3>
                            <div class="price">${p.precio} R$</div>
                            <button class="btn-p" style="width:100%; background: rgba(255,255,255,0.05); border: 1px solid var(--b);">ADQUIRIR AHORA</button>
                        </div>
                    `).join('');
                }
            } catch(e) { console.log("Backend offline"); }
        }

        function sw() { 
            isL = !isL; 
            document.getElementById('at').innerText = isL ? 'Welcome' : 'Join the Studio';
            document.getElementById('as').innerText = isL ? '¿Eres nuevo aquí?' : '¿Ya tienes cuenta?';
        }

        async function auth() {
            const email = document.getElementById('ae').value;
            const password = document.getElementById('ap').value;
            const path = isL ? '/api/login' : '/api/register';
            
            const res = await fetch(path, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });

            if(res.ok) {
                if(!isL) { 
                    alert("¡Cuenta registrada! Ya puedes entrar."); 
                    sw(); 
                } else {
                    // LOGIN EXITOSO: Ocultar botón de entrar y mostrar perfil
                    document.getElementById('nav-login-btn').style.display = 'none';
                    document.getElementById('user-profile').style.display = 'flex';
                    document.getElementById('u-name').innerText = email.split('@')[0].toUpperCase();
                    
                    if(email === 'admin@emmanuel.com') {
                        document.getElementById('adm-b').style.display = 'block';
                    }
                    closeM('auth-m');
                }
            } else { alert("Datos incorrectos o servidor no disponible."); }
        }

        async function add() {
            const name = document.getElementById('pn').value;
            const price = document.getElementById('pp').value;
            if(!name || !price) return;
            await fetch('/api/stock', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, price })
            });
            location.reload();
        }

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }
        function toggleD() { document.getElementById('u-drop').classList.toggle('active'); }
    </script>
</body>
</html>
