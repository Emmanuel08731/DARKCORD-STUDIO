<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKCORD STUDIO | ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #5865F2; --bg: #050505; --card: #121214; --t: #ffffff; --td: #a1a1aa; --b: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--t); overflow-x: hidden; }
        
        /* Decoración Visual */
        .glow { position: fixed; top: 0; left: 50%; width: 600px; height: 400px; background: radial-gradient(circle, rgba(88,101,242,0.15), transparent 70%); transform: translateX(-50%); z-index: -1; pointer-events: none; }

        nav { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(5,5,5,0.7); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; padding: 0 8%; z-index: 1000; border-bottom: 1px solid var(--b); }
        .logo { font-family: 'Syncopate'; font-size: 0.8rem; letter-spacing: 5px; color: var(--p); }

        .btn-p { background: var(--p); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-p:hover { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 0 20px rgba(88,101,242,0.4); }

        /* Tienda */
        .hero { padding: 160px 5% 40px; text-align: center; }
        .hero h1 { font-size: 4rem; font-weight: 800; letter-spacing: -3px; margin-bottom: 15px; }
        .hero span { color: var(--p); }
        
        .grid { padding: 40px 8%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card); padding: 35px; border-radius: 25px; border: 1px solid var(--b); transition: 0.4s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--p); transform: translateY(-5px); }
        .card h3 { font-size: 1.4rem; margin-bottom: 8px; }
        .price { font-size: 2.2rem; font-weight: 800; color: var(--p); margin: 15px 0; }

        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-c { background: #0f0f11; width: 90%; max-width: 400px; padding: 45px; border-radius: 30px; border: 1px solid var(--b); text-align: center; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 12px; background: #1a1a1c; border: 1px solid var(--b); color: white; font-size: 1rem; }
        input:focus { border-color: var(--p); outline: none; }

        /* Perfil Dropdown */
        .user-section { position: relative; }
        .drop { position: absolute; top: 55px; right: 0; width: 240px; background: #18181b; border-radius: 18px; border: 1px solid var(--b); display: none; flex-direction: column; padding: 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .drop.active { display: flex; }
        .drop-b { padding: 12px; border-radius: 10px; text-align: left; background: none; border: none; color: var(--td); cursor: pointer; font-weight: 600; }
        .drop-b:hover { background: var(--p); color: white; }
    </style>
</head>
<body>

    <div class="glow"></div>

    <nav>
        <div class="logo">DARKCORD STUDIO</div>
        <div class="user-section">
            <button class="btn-p" id="auth-btn" onclick="openM('auth-m')">CUENTA</button>
            <div id="user-ui" style="display: none; display: flex; align-items: center; gap: 10px; cursor: pointer;" onclick="toggleD()">
                <span id="u-name" style="font-weight: 800;">USUARIO</span>
                <div style="width:30px; height:30px; background:var(--p); border-radius:8px;"></div>
                <div class="drop" id="u-drop">
                    <button class="drop-b" id="adm-b" style="display:none; color:var(--p);" onclick="openM('adm-m')">PANEL ADMIN</button>
                    <button class="drop-b" onclick="location.reload()" style="color:#ff4d4d;">CERRAR SESIÓN</button>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>THE <span>PREMIUM</span> STUDIO</h1>
        <p style="color:var(--td); max-width:600px; margin:0 auto;">Cuentas exclusivas y stock digital actualizado en tiempo real.</p>
    </header>

    <div class="grid" id="grid"></div>

    <div class="modal" id="auth-m">
        <div class="modal-c">
            <h2 id="at" style="margin-bottom: 25px;">Welcome</h2>
            <input type="email" id="ae" placeholder="Email">
            <input type="password" id="ap" placeholder="Password">
            <button class="btn-p" style="width:100%; padding:15px;" onclick="auth()">CONTINUAR</button>
            <p style="margin-top:20px; font-size:0.8rem; color:var(--td);">
                <span id="as">¿Nuevo aquí?</span> <a href="#" onclick="sw()" style="color:var(--p); text-decoration:none;">Cambiar modo</a>
            </p>
        </div>
    </div>

    <div class="modal" id="adm-m">
        <div class="modal-c">
            <h2 style="margin-bottom:20px;">Staff Panel</h2>
            <input type="text" id="pn" placeholder="Nombre Producto">
            <input type="number" id="pp" placeholder="Precio (R$)">
            <button class="btn-p" style="width:100%;" onclick="add()">SUBIR AL STOCK</button>
            <button onclick="closeM('adm-m')" style="margin-top:15px; background:none; border:none; color:var(--td); cursor:pointer;">Cerrar</button>
        </div>
    </div>

    <script>
        let isL = true;
        
        window.onload = load;

        async function load() {
            const res = await fetch('/api/stock');
            const data = await res.json();
            document.getElementById('grid').innerHTML = data.map(p => `
                <div class="card">
                    <h3>${p.nombre}</h3>
                    <div class="price">${p.precio} R$</div>
                    <button class="btn-p" style="width:100%">COMPRAR</button>
                </div>
            `).join('') || '<p style="grid-column:1/-1; text-align:center; opacity:0.5;">Esperando stock...</p>';
        }

        function sw() { isL = !isL; document.getElementById('at').innerText = isL ? 'Welcome' : 'Join Us'; }

        async function auth() {
            const email = document.getElementById('ae').value;
            const password = document.getElementById('ap').value;
            const path = isL ? '/api/login' : '/api/register';
            
            const res = await fetch(path, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });

            if(res.ok) {
                if(!isL) { alert("¡Cuenta creada! Inicia sesión."); sw(); }
                else {
                    document.getElementById('auth-btn').style.display = 'none';
                    document.getElementById('user-ui').style.display = 'flex';
                    document.getElementById('u-name').innerText = email.split('@')[0].toUpperCase();
                    if(email === 'admin@emmanuel.com') document.getElementById('adm-b').style.display = 'block';
                    closeM('auth-m');
                }
            } else { alert("Error en los datos"); }
        }

        async function add() {
            const name = document.getElementById('pn').value;
            const price = document.getElementById('pp').value;
            await fetch('/api/stock', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, price })
            });
            location.reload();
        }

        function openM(id) { document.getElementById(id).style.display = 'flex'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }
        function toggleD() { document.getElementById('u-drop').classList.toggle('active'); }
    </script>
</body>
</html>
