<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Styles | Infinity OS</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --blue: #0071e3; --red: #ff3b30; --bg: #f5f5f7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .hidden { display: none !important; }
        
        .card { 
            background: white; padding: 40px; border-radius: 30px; 
            width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center; border: 1px solid rgba(0,0,0,0.05);
        }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #d2d2d7; background: #fafafa; font-size: 16px; outline: none;
        }

        .btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: rgba(255,59,48,0.1); color: var(--red); }

        /* Panel Admin */
        .admin-view { 
            position: fixed; inset: 0; background: #fff; z-index: 100; 
            padding: 50px 20px; overflow-y: auto; 
        }
        .user-item { 
            background: #f9f9fb; padding: 20px; border-radius: 15px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div id="auth-ui" class="card animate__animated animate__fadeIn">
    <h1 id="auth-title">Bienvenido</h1>
    <p id="auth-sub" style="color: #86868b; margin-bottom: 20px;">Diesel Styles Infinity</p>
    
    <div id="reg-box" class="hidden">
        <input type="text" id="name" placeholder="Nombre completo">
    </div>
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="pass" placeholder="Contraseña">
    
    <button class="btn btn-blue" onclick="auth()">Continuar</button>
    <button class="btn" style="background:none; color:var(--blue)" onclick="toggleMode()" id="mode-btn">¿No tienes cuenta? Regístrate</button>
</div>

<div id="dash-ui" class="card hidden animate__animated animate__fadeInUp">
    <h2 id="user-name">Hola</h2>
    <p style="margin-bottom: 20px;">Panel de control activo.</p>
    <button id="admin-btn" class="btn btn-blue hidden" onclick="openAdmin()">Gestionar Usuarios</button>
    <button class="btn btn-red" onclick="logout()">Cerrar Sesión</button>
</div>

<div id="admin-ui" class="admin-view hidden">
    <div style="max-width: 400px; margin: 0 auto;">
        <button onclick="closeAdmin()" style="border:none; color:var(--blue); cursor:pointer; font-weight:700;">← Volver</button>
        <h1 style="margin: 20px 0;">Usuarios</h1>
        <div id="users-list"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    let user = null;
    let isReg = false;

    function toggleMode() {
        isReg = !isReg;
        document.getElementById('reg-box').classList.toggle('hidden');
        document.getElementById('auth-title').innerText = isReg ? 'Crear Cuenta' : 'Bienvenido';
        document.getElementById('mode-btn').innerText = isReg ? 'Ya tengo cuenta' : '¿No tienes cuenta? Regístrate';
    }

    async function auth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const nombre = document.getElementById('name').value;
        const url = isReg ? '/api/auth/register' : '/api/auth/login';

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombre, email, password })
            });
            const data = await res.json();
            if (res.ok) {
                if (isReg) { Swal.fire('Éxito', 'Cuenta creada', 'success'); toggleMode(); }
                else { 
                    user = data; 
                    localStorage.setItem('diesel_user', JSON.stringify(user));
                    showDash(); 
                }
            } else { Swal.fire('Error', data.error, 'error'); }
        } catch (e) { Swal.fire('Error', 'Servidor desconectado', 'error'); }
    }

    function showDash() {
        document.getElementById('auth-ui').classList.add('hidden');
        document.getElementById('dash-ui').classList.remove('hidden');
        document.getElementById('user-name').innerText = "Hola, " + user.nombre;
        if (user.email === MASTER) document.getElementById('admin-btn').classList.remove('hidden');
    }

    async function openAdmin() {
        document.getElementById('admin-ui').classList.remove('hidden');
        const res = await fetch(`/api/admin/users?admin_email=${user.email}`);
        const users = await res.json();
        const list = document.getElementById('users-list');
        list.innerHTML = users.map(u => `
            <div class="user-item">
                <div style="text-align:left"><b>${u.nombre}</b><br><small>${u.email}</small></div>
                <button class="btn-red" style="padding: 5px 10px; width:auto; margin:0;" onclick="deleteUser(${u.id})">Borrar</button>
            </div>
        `).join('');
    }

    async function deleteUser(id) {
        const confirm = await Swal.fire({ title: '¿Borrar cuenta?', showCancelButton: true });
        if (confirm.isConfirmed) {
            await fetch(`/api/admin/user/${id}?admin_email=${user.email}`, { method: 'DELETE' });
            openAdmin();
        }
    }

    function logout() { localStorage.removeItem('diesel_user'); location.reload(); }
    function closeAdmin() { document.getElementById('admin-ui').classList.add('hidden'); }

    // Auto-login
    window.onload = () => {
        const saved = localStorage.getItem('diesel_user');
        if (saved) { user = JSON.parse(saved); showDash(); }
    };
</script>
</body>
</html>
