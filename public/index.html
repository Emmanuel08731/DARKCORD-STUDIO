<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Colombia Styles | Workforce</title>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.8);
            --apple-blue: #0071e3;
            --apple-text: #1d1d1f;
            --apple-gray: #86868b;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        .hidden { display: none !important; }
        
        /* Glassmorphism Navbar */
        nav {
            position: sticky; top: 0;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 40px; z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .container { max-width: 700px; margin: 60px auto; padding: 20px; text-align: center; }

        /* Apple Cards */
        .card {
            background: var(--apple-card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.3);
            margin-bottom: 20px;
        }

        h1, h2 { font-weight: 600; letter-spacing: -0.02em; }
        
        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border-radius: 12px; border: 1px solid #d2d2d7;
            background: #fff; font-size: 16px; box-sizing: border-box;
            transition: border 0.3s;
        }
        input:focus { border: 1px solid var(--apple-blue); outline: none; }

        button {
            width: 100%; padding: 14px; border-radius: 12px;
            border: none; background: var(--apple-blue);
            color: white; font-size: 16px; font-weight: 500;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        .btn-secondary { background: #e8e8ed; color: var(--apple-blue); margin-top: 10px; }

        .timer-big { font-size: 4rem; font-weight: 700; margin: 20px 0; color: var(--apple-text); }
        
        /* Admin Section */
        .user-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid #eee; text-align: left;
        }
        .admin-badge { background: #ff3b30; color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; }
    </style>
</head>
<body>

<nav id="navbar" class="hidden">
    <div style="font-weight: 600;">Diesel Styles</div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div id="admin-tools" class="hidden">
            <button onclick="showUserList()" style="width: auto; padding: 5px 12px; font-size: 12px;">Admin: Usuarios</button>
        </div>
        <span id="nav-user-name" style="font-size: 14px; color: var(--apple-gray);"></span>
        <button onclick="location.reload()" style="width: auto; padding: 5px 12px; background: #333; font-size: 12px;">Salir</button>
    </div>
</nav>

<div id="view-login" class="container">
    <div class="card">
        <h1 id="auth-title">Diesel Colombia Styles</h1>
        <p style="color: var(--apple-gray);">Inicia sesión para gestionar tu tiempo.</p>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="handleAuth()">Continuar</button>
        <p id="toggle-text" onclick="toggleAuth()" style="font-size: 14px; color: var(--apple-blue); cursor: pointer; margin-top: 20px;">¿No tienes cuenta? Regístrate</p>
    </div>
</div>

<div id="view-dashboard" class="container hidden">
    <h2>Hola, <span id="worker-name"></span></h2>
    <p style="color: var(--apple-gray);">Registra tu tiempo de trabajo hoy.</p>

    <div class="card">
        <div id="box-start">
            <input type="text" id="task-name" placeholder="¿En qué vas a trabajar?">
            <button onclick="startTimer()">Iniciar Jornada</button>
        </div>
        <div id="box-active" class="hidden">
            <p style="text-transform: uppercase; font-size: 12px; color: var(--apple-blue); font-weight: bold;">Tiempo Actual</p>
            <div class="timer-big" id="display-time">00:00:00</div>
            <p id="active-task-label" style="margin-bottom: 20px; font-weight: 500;"></p>
            <button onclick="stopTimer()" style="background: #1d1d1f;">Pausar y Guardar</button>
        </div>
    </div>
    
    <button class="btn-secondary" onclick="viewMyHistory()">Ver mis tiempos de trabajo</button>

    <div id="history-results" class="card hidden" style="margin-top: 20px; text-align: left;">
        <h3 style="font-size: 18px;">Historial Reciente</h3>
        <div id="list-tiempos"></div>
    </div>
</div>

<div id="view-admin" class="container hidden">
    <div class="card">
        <h2>Panel de Administración</h2>
        <p style="color: var(--apple-gray);">Lista de trabajadores registrados</p>
        <div id="list-users-admin"></div>
        <button class="btn-secondary" onclick="showDashboard()">Volver a mi Perfil</button>
    </div>
</div>

<script>
    let user = null;
    let timer = null;
    let startTime = null;
    let isRegister = false;
    const ADMIN_EMAIL = "emma2013rqgmail.com"; // El correo que pediste

    function toggleAuth() {
        isRegister = !isRegister;
        document.getElementById('auth-title').innerText = isRegister ? "Crear Cuenta" : "Diesel Colombia Styles";
        document.getElementById('toggle-text').innerText = isRegister ? "Ya tengo cuenta, entrar" : "¿No tienes cuenta? Regístrate";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const url = isRegister ? '/api/register' : '/api/login';

        const res = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre: email.split('@')[0], email, password })
        });

        if (res.ok) {
            user = await res.json();
            loginSuccess();
        } else { alert("Error en credenciales"); }
    }

    function loginSuccess() {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-dashboard').classList.remove('hidden');
        document.getElementById('navbar').classList.remove('hidden');
        document.getElementById('worker-name').innerText = user.nombre;
        document.getElementById('nav-user-name').innerText = user.nombre;

        if (user.email === ADMIN_EMAIL) {
            document.getElementById('admin-tools').classList.remove('hidden');
        }
    }

    function startTimer() {
        const task = document.getElementById('task-name').value;
        if (!task) return alert("Escribe la actividad");
        startTime = new Date();
        document.getElementById('active-task-label').innerText = task;
        document.getElementById('box-start').classList.add('hidden');
        document.getElementById('box-active').classList.remove('hidden');
        timer = setInterval(() => {
            const diff = new Date(new Date() - startTime);
            document.getElementById('display-time').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    async function stopTimer() {
        clearInterval(timer);
        const end = new Date();
        await fetch('/api/tiempo', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                usuario_id: user.id,
                actividad: document.getElementById('active-task-label').innerText,
                inicio: startTime.toLocaleTimeString(),
                fin: end.toLocaleTimeString(),
                fecha: new Date().toLocaleDateString()
            })
        });
        alert("Guardado");
        location.reload();
    }

    async function viewMyHistory() {
        renderTiempos(user.id, 'list-tiempos');
        document.getElementById('history-results').classList.remove('hidden');
    }

    async function showUserList() {
        document.getElementById('view-dashboard').classList.add('hidden');
        document.getElementById('view-admin').classList.remove('hidden');
        const res = await fetch('/api/admin/usuarios');
        const users = await res.json();
        const div = document.getElementById('list-users-admin');
        div.innerHTML = users.map(u => `
            <div class="user-row">
                <div>
                    <strong>${u.nombre}</strong><br>
                    <small>${u.email}</small>
                </div>
                <button onclick="viewUserTimes(${u.id}, '${u.nombre}')" style="width:auto; padding:5px 10px; font-size:11px;">Ver Tiempos</button>
            </div>
        `).join('');
    }

    async function viewUserTimes(id, nombre) {
        // Reutilizamos la lógica para mostrar tiempos de cualquier usuario
        document.getElementById('view-admin').classList.add('hidden');
        document.getElementById('view-dashboard').classList.remove('hidden');
        document.getElementById('worker-name').innerText = "Tiempos de " + nombre;
        renderTiempos(id, 'list-tiempos');
        document.getElementById('history-results').classList.remove('hidden');
        document.getElementById('box-start').classList.add('hidden');
    }

    async function renderTiempos(id, targetDiv) {
        const res = await fetch(`/api/tiempos/${id}`);
        const data = await res.json();
        const div = document.getElementById(targetDiv);
        if (data.length === 0) {
            div.innerHTML = "<p style='color:gray'>No tiene tiempo de trabajo.</p>";
        } else {
            div.innerHTML = data.map(t => `
                <div style="border-bottom: 1px solid #eee; padding: 10px 0;">
                    <div style="font-weight:600">${t.actividad}</div>
                    <div style="font-size:12px; color:gray">${t.fecha} | ${t.hora_inicio} - ${t.hora_fin}</div>
                </div>
            `).join('');
        }
    }

    function showDashboard() {
        location.reload();
    }
</script>
</body>
</html>
