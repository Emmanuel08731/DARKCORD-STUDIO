<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workstation Studio | Professional White</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        :root {
            --apple-blue: #0071E3;
            --apple-red: #FF3B30;
            --bg-studio: #F5F5F7;
            --white: #FFFFFF;
            --text-main: #1D1D1F;
            --text-sub: #86868B;
            --border: #D2D2D7;
            --shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        body { 
            background: var(--bg-studio); 
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
            color: var(--text-main);
        }

        /* Ventana Principal */
        .studio-frame {
            background: var(--white);
            width: 95%; max-width: 1100px; height: 850px;
            border-radius: 30px; border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .top-nav {
            padding: 25px 45px; border-bottom: 1px solid var(--bg-studio);
            display: flex; justify-content: space-between; align-items: center;
        }
        .window-dots { display: flex; gap: 10px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        .main-content { flex: 1; padding: 60px; overflow-y: auto; text-align: center; }
        h1 { font-size: 60px; font-weight: 800; letter-spacing: -3px; color: var(--text-main); margin-bottom: 10px; }
        .tagline { font-size: 20px; color: var(--text-sub); margin-bottom: 50px; font-weight: 400; }

        /* Formulario Studio */
        .form-center { max-width: 420px; margin: 0 auto; }
        .field { margin-bottom: 25px; text-align: left; }
        .field label { font-size: 13px; font-weight: 700; color: var(--apple-blue); margin-left: 10px; margin-bottom: 8px; display: block; }
        
        input {
            width: 100%; padding: 22px; border-radius: 16px; border: 1px solid var(--border);
            background: var(--bg-studio); color: var(--text-main); font-size: 18px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--apple-blue); background: var(--white); box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

        /* Botones Pro */
        .btn-studio {
            padding: 22px; border-radius: 16px; border: none; font-size: 18px; font-weight: 600;
            cursor: pointer; width: 100%; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-primary { background: var(--apple-blue); color: white; box-shadow: 0 10px 25px rgba(0,113,227,0.25); }
        .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-ghost { background: transparent; color: var(--apple-blue); margin-top: 15px; }

        /* Cronómetro */
        .chrono-text { font-size: 150px; font-weight: 800; letter-spacing: -8px; color: var(--text-main); margin: 40px 0; }

        /* Admin Cards */
        .admin-card {
            background: var(--white); padding: 25px 35px; border-radius: 20px;
            margin-bottom: 15px; border: 1px solid #E5E5EA; display: flex; justify-content: space-between; align-items: center;
            transition: 0.4s; text-align: left;
        }
        .admin-card:hover { transform: scale(1.02); box-shadow: var(--shadow); }
        .user-name { font-size: 22px; font-weight: 700; color: var(--apple-blue); cursor: pointer; }
        .user-name:hover { text-decoration: underline; }

        .vault-info { 
            background: #F2F2F7; padding: 12px; border-radius: 12px; margin-top: 10px; 
            font-family: 'SF Mono', monospace; font-size: 13px; color: #3A3A3C;
        }

        .action-tray { display: flex; gap: 12px; }
        .action-btn { 
            width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-size: 18px;
        }
        .btn-unlock { color: #FF9500; background: #FFF9F0; border: 1px solid #FFCC00; }
        .btn-unlock:hover { background: #FFCC00; color: white; }
        .btn-delete { color: var(--apple-red); background: #FFF2F1; border: 1px solid #FFD5D2; }
        .btn-delete:hover { background: var(--apple-red); color: white; }

        /* Capas */
        .overlay { position: absolute; inset: 0; background: var(--white); z-index: 1000; padding: 60px; overflow-y: auto; text-align: left; }
        .close-btn { color: var(--apple-blue); font-weight: 700; cursor: pointer; margin-bottom: 40px; font-size: 18px; display: block; }
        .hidden { display: none !important; }

        /* Estilo para las tareas (Web Blanca) */
        .task-row {
            padding: 20px; border-bottom: 1px solid var(--bg-studio); display: flex; justify-content: space-between;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="studio-frame">
    <div class="top-nav">
        <div class="window-dots">
            <div class="dot" style="background:#FF5F57"></div><div class="dot" style="background:#FFBD2E"></div><div class="dot" style="background:#28C840"></div>
        </div>
        <div style="font-size:12px; font-weight:700; color:var(--text-sub); letter-spacing:1px;">STUDIO WORKSTATION V7</div>
    </div>

    <div class="main-content">
        <div id="auth-box">
            <h1>Workstation</h1>
            <p class="tagline">Diseñado para la simplicidad y el rendimiento.</p>
            
            <div class="form-center">
                <div id="name-wrap" class="field hidden animate__animated animate__fadeInDown">
                    <label>Nombre Profesional</label>
                    <input type="text" id="in-name" placeholder="Ej. Alex Studio">
                </div>
                <div class="field">
                    <label>ID de Acceso (Email)</label>
                    <input type="email" id="in-email" placeholder="nombre@estudio.com">
                </div>
                <div class="field">
                    <label>Clave</label>
                    <input type="password" id="in-pass" placeholder="••••••••">
                </div>
                
                <button class="btn-studio btn-primary" onclick="processAuth()" id="btn-main-auth">
                    Entrar al Studio <i class="fa fa-arrow-right"></i>
                </button>
                
                <button class="btn-studio btn-ghost" onclick="switchMode()" id="btn-switch">
                    ¿Nuevo aquí? Crea tu cuenta
                </button>
            </div>
        </div>

        <div id="dash-box" class="hidden animate__animated animate__fadeIn">
            <h1 id="welcome-txt">Hola</h1>
            <p class="tagline">Gestión de tiempo en tiempo real.</p>
            
            <div id="idle-view">
                <div class="form-center">
                    <div class="field">
                        <label>Proyecto Actual</label>
                        <input type="text" id="in-proj" placeholder="Ej. Diseño de Interfaz Pro">
                    </div>
                    <button class="btn-studio btn-primary" onclick="startTimer()">
                        <i class="fa fa-play"></i> Iniciar Sesión
                    </button>
                    
                    <div style="margin-top:25px; display:flex; gap:15px; justify-content:center;">
                        <button class="btn-studio" style="background:#F2F2F7; color:#1D1D1F; width:auto;" onclick="viewMyHistory()">
                            Historial
                        </button>
                        <button id="adm-access" class="btn-studio hidden" style="background:black; color:white; width:auto;" onclick="openAdminVault()">
                            Panel Admin
                        </button>
                    </div>
                    
                    <p onclick="logout()" style="margin-top:60px; color:var(--apple-red); font-weight:700; cursor:pointer;">Cerrar Sesión</p>
                </div>
            </div>

            <div id="active-view" class="hidden">
                <div class="chrono-text" id="timer-out">00:00:00</div>
                <button class="btn-studio btn-primary" style="background:var(--apple-red); width:auto;" onclick="stopTimer()">
                    <i class="fa fa-stop"></i> Finalizar y Guardar
                </button>
            </div>
        </div>
    </div>

    <div id="layer-admin" class="overlay hidden animate__animated animate__slideInRight">
        <span class="close-btn" onclick="closeLayer('layer-admin')"><i class="fa fa-chevron-left"></i> SALIR DE LA BÓVEDA</span>
        <h1>Bóveda de Control</h1>
        <p class="tagline">Seguridad y auditoría de miembros del equipo.</p>
        <div id="admin-feed"></div>
    </div>

    <div id="layer-tasks" class="overlay hidden animate__animated animate__slideInRight">
        <span class="close-btn" onclick="closeLayer('layer-tasks')"><i class="fa fa-chevron-left"></i> VOLVER</span>
        <h1 id="task-title">Actividades</h1>
        <p class="tagline">Listado detallado de sesiones guardadas.</p>
        <div id="task-feed" style="margin-top:30px; background:var(--bg-studio); border-radius:20px; overflow:hidden;"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    let user = null, isReg = false, clockInt = null;

    function switchMode() {
        isReg = !isReg;
        document.getElementById('name-wrap').classList.toggle('hidden');
        document.getElementById('btn-main-auth').innerText = isReg ? 'Registrarse' : 'Entrar al Studio';
        document.getElementById('btn-switch').innerText = isReg ? '¿Ya tienes cuenta? Inicia sesión' : '¿Nuevo aquí? Crea tu cuenta';
    }

    async function processAuth() {
        const email = document.getElementById('in-email').value, password = document.getElementById('in-pass').value, nombre = document.getElementById('in-name').value;
        const res = await fetch(isReg ? '/api/auth/register' : '/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre, email, password })
        });
        const data = await res.json();
        if (res.ok) {
            if (isReg) { Swal.fire('Listo', 'Cuenta creada con éxito.', 'success'); switchMode(); }
            else { user = data; localStorage.setItem('studio_user', JSON.stringify(data)); enterDash(); }
        } else { Swal.fire('Error', data.error, 'error'); }
    }

    function enterDash() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('dash-box').classList.remove('hidden');
        document.getElementById('welcome-txt').innerText = "Hola, " + user.nombre;
        if (user.email === MASTER) document.getElementById('adm-access').classList.remove('hidden');
    }

    function startTimer() {
        const p = document.getElementById('in-proj').value;
        if (!p) return Swal.fire('Proyecto', 'Ingresa el nombre de la tarea.', 'info');
        document.getElementById('idle-view').classList.add('hidden');
        document.getElementById('active-view').classList.remove('hidden');
        const start = Date.now();
        clockInt = setInterval(() => {
            const d = Date.now() - start;
            const h = Math.floor(d/3600000).toString().padStart(2,'0');
            const m = Math.floor((d%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((d%60000)/1000).toString().padStart(2,'0');
            document.getElementById('timer-out').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    async function stopTimer() {
        clearInterval(clockInt);
        const dur = document.getElementById('timer-out').innerText;
        await fetch('/api/trabajo/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario_id: user.id, proyecto: document.getElementById('in-proj').value, duracion: dur })
        });
        location.reload();
    }

    async function openAdminVault() {
        document.getElementById('layer-admin').classList.remove('hidden');
        const r = await fetch(`/api/admin/usuarios?admin_email=${user.email}`);
        const data = await r.json();
        document.getElementById('admin-feed').innerHTML = data.map(u => `
            <div class="admin-card animate__animated animate__fadeInUp">
                <div>
                    <span class="user-name" onclick="inspectUser(${u.id}, '${u.nombre}')">${u.nombre}</span>
                    <div id="vault-${u.id}" class="vault-info hidden">
                        📧 ${u.email} <br> 🔑 ${u.password}
                    </div>
                </div>
                <div class="action-tray">
                    <div class="action-btn btn-unlock" onclick="unlockCreds('${u.id}')" title="Revelar">
                        <i class="fa fa-key"></i>
                    </div>
                    <div class="action-btn btn-delete" onclick="removeUser(${u.id})" title="Eliminar">
                        <i class="fa fa-trash"></i>
                    </div>
                </div>
            </div>
        `).join('') || 'No hay usuarios registrados.';
    }

    async function unlockCreds(id) {
        const { value: key } = await Swal.fire({
            title: 'Código Maestro',
            input: 'password',
            inputPlaceholder: 'Introduce la clave de la bóveda',
        });
        if (key === '0613') {
            document.getElementById(`vault-${id}`).classList.toggle('hidden');
        } else {
            Swal.fire('Denegado', 'Clave de bóveda incorrecta.', 'error');
        }
    }

    async function inspectUser(id, nombre) {
        document.getElementById('layer-tasks').classList.remove('hidden');
        document.getElementById('task-title').innerText = "Tareas de " + nombre;
        const r = await fetch(`/api/admin/tareas/${id}`);
        const data = await r.json();
        document.getElementById('task-feed').innerHTML = data.map(t => `
            <div class="task-row">
                <span><b>${t.proyecto}</b> <small style="color:var(--text-sub); margin-left:10px;">${t.fecha}</small></span>
                <span style="color:var(--apple-blue); font-weight:800;">${t.duracion}</span>
            </div>
        `).join('') || '<p style="padding:40px; text-align:center;">Este usuario no tiene tareas registradas.</p>';
    }

    async function removeUser(id) {
        const c = await Swal.fire({ title: '¿Eliminar miembro?', icon: 'warning', showCancelButton: true, confirmButtonColor: var(--apple-red) });
        if (c.isConfirmed) { await fetch(`/api/admin/usuarios/${id}?admin_email=${user.email}`, {method: 'DELETE'}); openAdminVault(); }
    }

    function viewMyHistory() { inspectUser(user.id, "Mis Actividades"); }
    function closeLayer(id) { document.getElementById(id).classList.add('hidden'); }
    function logout() { localStorage.clear(); location.reload(); }
    window.onload = () => { const s = localStorage.getItem('studio_user'); if(s) { user = JSON.parse(s); enterDash(); } };
</script>
</body>
</html>
