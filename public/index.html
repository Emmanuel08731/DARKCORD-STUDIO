<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Styles | Business Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --blue: #007AFF;
            --bg: #F5F5F7;
            --white: #FFFFFF;
            --gray: #86868B;
            --text: #1D1D1F;
            --glass: rgba(255, 255, 255, 0.72);
            --shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: var(--bg); color: var(--text); overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* HEADER APPLE */
        header {
            position: fixed; top: 0; width: 100%; height: 52px;
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px);
            background: var(--glass); border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 1000;
        }

        .logo { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }

        /* CONTENEDORES PRINCIPALES */
        .page-wrapper {
            min-height: 100vh; display: flex; align-items: center;
            justify-content: center; padding: 80px 20px;
        }

        .apple-card {
            background: var(--white); border-radius: 32px; padding: 48px;
            width: 100%; max-width: 440px; box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02); text-align: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dash-card { max-width: 800px; text-align: left; }

        /* TIPOGRAFÍA */
        h1 { font-size: 40px; font-weight: 700; letter-spacing: -1.5px; margin-bottom: 12px; }
        h2 { font-size: 30px; font-weight: 600; margin-bottom: 8px; }
        p { color: var(--gray); font-size: 17px; line-height: 1.4; margin-bottom: 30px; }

        /* FORMULARIOS */
        .field { margin-bottom: 16px; text-align: left; }
        .field label { font-size: 13px; font-weight: 600; color: var(--gray); margin-left: 10px; }
        
        input {
            width: 100%; padding: 18px; margin-top: 6px;
            border-radius: 16px; border: 1px solid #D2D2D7;
            background: rgba(255,255,255,0.8); font-size: 17px;
            transition: all 0.3s ease;
        }
        input:focus {
            border-color: var(--blue); outline: none;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        /* BOTONES */
        .btn-main {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            background: var(--blue); color: white; font-size: 17px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-main:active { transform: scale(0.97); }

        .btn-link { 
            background: none; border: none; color: var(--blue);
            font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 24px;
        }

        /* DASHBOARD ELEMENTOS */
        .timer-hero {
            background: #000; color: #fff; border-radius: 28px;
            padding: 40px; text-align: center; margin: 30px 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .clock { font-size: 76px; font-weight: 700; font-variant-numeric: tabular-nums; }

        .status-pill {
            display: inline-block; padding: 6px 14px; border-radius: 20px;
            background: rgba(0, 122, 255, 0.1); color: var(--blue);
            font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px;
        }

        /* HISTORIAL */
        .h-list { margin-top: 20px; }
        .h-item {
            background: white; border-radius: 20px; padding: 20px;
            margin-bottom: 12px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid rgba(0,0,0,0.04);
            animation: fadeInUp 0.5s ease;
        }
        .h-info b { font-size: 18px; display: block; }
        .h-info span { color: var(--gray); font-size: 13px; }
        .h-time { font-weight: 700; color: var(--blue); font-size: 19px; }

        /* ADMIN */
        .user-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px; background: #fff; border-radius: 18px; margin-bottom: 10px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header id="nav-bar" class="hidden">
    <div class="logo">Diesel Styles</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <button id="admin-badge" onclick="goAdmin()" class="hidden" style="background:#000; color:#fff; border:none; padding:6px 14px; border-radius:10px; cursor:pointer; font-size:12px;">Admin</button>
        <span id="nav-name" style="font-weight: 500; font-size: 14px;"></span>
        <button onclick="location.reload()" style="background:none; border:none; color:red; font-size:13px; cursor:pointer;">Cerrar</button>
    </div>
</header>

<div class="page-wrapper">

    <div id="auth-section" class="apple-card animate__animated animate__fadeInUp">
        <h1 id="a-title">Entrar</h1>
        <p id="a-sub">Usa tu ID de Diesel Colombia para acceder.</p>

        <div id="reg-fields" class="hidden">
            <div class="field">
                <label>NOMBRE COMPLETO</label>
                <input type="text" id="reg-name" placeholder="Ej: Emmanuel Rodriguez">
            </div>
        </div>

        <div class="field">
            <label>CORREO ELECTRÓNICO</label>
            <input type="email" id="in-email" placeholder="nombre@gmail.com">
        </div>

        <div class="field">
            <label>CONTRASEÑA</label>
            <input type="password" id="in-pass" placeholder="Contraseña">
        </div>

        <button class="btn-main" onclick="handleAuth()" id="btn-submit">Continuar</button>
        <button class="btn-link" onclick="toggleMode()" id="btn-switch">¿No tienes cuenta? Regístrate</button>
    </div>

    <div id="app-section" class="apple-card dash-card hidden animate__animated animate__fadeIn">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>Hola, <span id="user-name"></span></h2>
            <div id="live-dot" style="width: 10px; height: 10px; background: #34c759; border-radius: 50%; box-shadow: 0 0 8px #34c759;"></div>
        </div>
        <p>Registro de actividades para hoy.</p>

        <div id="work-setup">
            <div class="field">
                <label>ACTIVIDAD A REALIZAR</label>
                <input type="text" id="work-input" placeholder="¿En qué vas a trabajar?">
            </div>
            <button class="btn-main" onclick="startWork()">Iniciar Jornada Laboral</button>
        </div>

        <div id="work-active" class="hidden">
            <div class="timer-hero">
                <span class="status-pill">Trabajando ahora</span>
                <div class="clock" id="clock-display">00:00:00</div>
                <p id="current-task" style="color:rgba(255,255,255,0.6); margin:0;"></p>
            </div>
            <button class="btn-main" style="background:#ff3b30;" onclick="stopWork()">Finalizar Actividad</button>
        </div>

        <div style="margin-top: 40px; border-top: 1px solid #eee; padding-top: 30px;">
            <h3>Historial de hoy</h3>
            <div id="history-list" class="h-list"></div>
        </div>
    </div>

    <div id="admin-section" class="apple-card dash-card hidden animate__animated animate__fadeIn">
        <h1>Administración</h1>
        <p>Control de tiempos de Diesel Colombia Styles.</p>
        <div id="admin-users"></div>
        <button class="btn-link" onclick="goBack()">Volver a mi perfil</button>
    </div>

</div>

<script>
    let user = null;
    let isReg = false;
    let timer = null;
    let start = null;

    function toggleMode() {
        isReg = !isReg;
        document.getElementById('a-title').innerText = isReg ? "Registro" : "Entrar";
        document.getElementById('reg-fields').classList.toggle('hidden');
        document.getElementById('btn-submit').innerText = isReg ? "Crear Cuenta" : "Continuar";
        document.getElementById('btn-switch').innerText = isReg ? "Ya tengo cuenta, entrar" : "¿No tienes cuenta? Regístrate";
    }

    async function handleAuth() {
        const email = document.getElementById('in-email').value;
        const password = document.getElementById('in-pass').value;
        const nombre = document.getElementById('reg-name').value;

        const path = isReg ? '/api/auth/register' : '/api/auth/login';
        
        try {
            const res = await fetch(path, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombre, email, password })
            });
            const data = await res.json();

            if (res.ok) {
                if (isReg) {
                    Swal.fire({ title: '¡Cuenta Creada!', text: 'Ya puedes iniciar sesión', icon: 'success', confirmButtonColor: '#007AFF' });
                    toggleMode();
                } else {
                    user = data;
                    launch();
                }
            } else {
                Swal.fire({ title: 'Atención', text: data.message, icon: 'warning', confirmButtonColor: '#007AFF' });
            }
        } catch (e) { Swal.fire('Error', 'No hay conexión', 'error'); }
    }

    function launch() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('nav-bar').classList.remove('hidden');
        document.getElementById('user-name').innerText = user.nombre;
        document.getElementById('nav-name').innerText = user.nombre;
        if (user.rol === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
        refreshHistory();
    }

    function startWork() {
        const task = document.getElementById('work-input').value;
        if (!task) return Swal.fire('Falta información', 'Escribe tu tarea', 'info');

        start = new Date();
        document.getElementById('current-task').innerText = task;
        document.getElementById('work-setup').classList.add('hidden');
        document.getElementById('work-active').classList.remove('hidden');

        timer = setInterval(() => {
            const diff = new Date(new Date() - start);
            document.getElementById('clock-display').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    async function stopWork() {
        clearInterval(timer);
        const duration = document.getElementById('clock-display').innerText;
        
        await fetch('/api/work/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                usuario_id: user.id,
                actividad: document.getElementById('current-task').innerText,
                inicio: start.toLocaleTimeString(),
                fin: new Date().toLocaleTimeString(),
                fecha: new Date().toLocaleDateString(),
                duracion: duration
            })
        });

        // Limpiar para nueva tarea sin cerrar sesión
        document.getElementById('work-input').value = "";
        document.getElementById('clock-display').innerText = "00:00:00";
        document.getElementById('work-setup').classList.remove('hidden');
        document.getElementById('work-active').classList.add('hidden');
        
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Tiempo guardado', showConfirmButton: false, timer: 2000 });
        refreshHistory();
    }

    async function refreshHistory(targetId = user.id, targetName = "Hoy") {
        const res = await fetch(`/api/work/history/${targetId}`);
        const data = await res.json();
        const list = document.getElementById('history-list');
        list.innerHTML = data.length ? data.map(i => `
            <div class="h-item">
                <div class="h-info"><b>${i.actividad}</b><span>${i.fecha} • ${i.hora_inicio} - ${i.hora_fin}</span></div>
                <div class="h-time">${i.duracion_total}</div>
            </div>
        `).join('') : '<p style="text-align:center; padding:20px;">Sin registros hoy.</p>';
    }

    async function goAdmin() {
        document.getElementById('app-section').classList.add('hidden');
        document.getElementById('admin-section').classList.remove('hidden');
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        document.getElementById('admin-users').innerHTML = users.map(u => `
            <div class="user-row">
                <div><b>${u.nombre}</b><br><small>${u.email}</small></div>
                <button onclick="inspect(${u.id}, '${u.nombre}')" style="background:#000; color:#fff; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">Ver Tiempos</button>
            </div>
        `).join('');
    }

    function inspect(id, name) {
        document.getElementById('admin-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('work-setup').classList.add('hidden');
        refreshHistory(id, name);
    }

    function goBack() {
        document.getElementById('admin-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('work-setup').classList.remove('hidden');
        refreshHistory();
    }
</script>
</body>
</html>
