<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Colombia Styles</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #ffffff;
            --secondary-bg: #f5f5f7;
            --label: #86868b;
            --text: #1d1d1f;
            --blue: #0071e3;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--secondary-bg); color: var(--text); 
            margin: 0; display: flex; flex-direction: column; min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* Navbar Blur Apple */
        nav {
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.7);
            padding: 12px 30px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }

        /* Estilo Contenedores */
        .auth-container { 
            width: 100%; max-width: 400px; margin: auto; 
            background: var(--bg); padding: 40px; border-radius: 24px;
            box-shadow: var(--card-shadow); text-align: center;
        }

        .dashboard-container { max-width: 800px; margin: 40px auto; width: 90%; }

        h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 10px; }
        
        /* Inputs Estilo iOS */
        input {
            width: 100%; padding: 16px; margin: 8px 0; border: 1px solid #d2d2d7;
            border-radius: 12px; font-size: 17px; background: #fff;
            box-sizing: border-box; transition: 0.2s;
        }
        input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }

        /* Botones Apple */
        button {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--blue); color: white; font-size: 17px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 15px;
        }
        button:hover { opacity: 0.9; }
        .btn-ghost { background: transparent; color: var(--blue); margin-top: 5px; }

        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: var(--card-shadow); margin-bottom: 20px; }
        
        .timer { font-size: 60px; font-weight: 700; margin: 20px 0; font-variant-numeric: tabular-nums; }
        
        /* Estilos lista admin */
        .user-item { 
            display: flex; justify-content: space-between; padding: 15px; 
            border-bottom: 1px solid #f2f2f2; align-items: center;
        }
    </style>
</head>
<body>

<nav id="navbar" class="hidden">
    <strong style="font-size: 19px;">Diesel Styles</strong>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div id="admin-menu" class="hidden">
            <button onclick="showAdmin()" style="width: auto; padding: 8px 15px; font-size: 13px; margin: 0;">Lista de Usuarios</button>
        </div>
        <span id="user-pill" style="color: var(--label); font-size: 14px;"></span>
        <button onclick="location.reload()" style="width: auto; padding: 8px 15px; background: #1d1d1f; font-size: 13px; margin: 0;">Cerrar Sesión</button>
    </div>
</nav>

<div id="view-auth" style="display: flex; flex: 1;">
    <div class="auth-container">
        <h1 id="auth-title">Diesel Colombia</h1>
        <p id="auth-sub" style="color: var(--label);">Ingresa tus credenciales para continuar.</p>
        
        <div id="reg-fields" class="hidden">
            <input type="text" id="reg-nombre" placeholder="Nombre completo">
        </div>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="pass" placeholder="Contraseña">
        
        <button onclick="handleAuth()" id="btn-main">Iniciar Sesión</button>
        <button class="btn-ghost" onclick="toggleMode()" id="btn-toggle">¿No tienes cuenta? Crea una</button>
    </div>
</div>

<div id="view-app" class="dashboard-container hidden">
    <div class="card">
        <h2>Hola, <span id="welcome-name"></span></h2>
        <p style="color: var(--label);">Proyecto: Diesel Colombia Styles</p>
        
        <div id="work-setup">
            <input type="text" id="task-input" placeholder="¿En qué vas a trabajar?">
            <button onclick="startClock()">Iniciar Tiempo</button>
        </div>

        <div id="work-active" class="hidden" style="text-align: center;">
            <p id="current-task-display" style="font-weight: 600; color: var(--blue);"></p>
            <div class="timer" id="timer-display">00:00:00</div>
            <button onclick="stopClock()" style="background: #1d1d1f;">Finalizar Actividad</button>
        </div>
    </div>

    <button class="btn-ghost" onclick="loadHistory(user.id)" style="font-weight: 600;">Ver mis tiempos de trabajo</button>
    
    <div id="history-card" class="card hidden" style="margin-top: 20px;">
        <h3 id="history-title">Tu Historial</h3>
        <div id="history-list"></div>
    </div>
</div>

<div id="view-admin" class="dashboard-container hidden">
    <div class="card">
        <h2>Panel de Control</h2>
        <p style="color: var(--label);">Selecciona un trabajador para auditar sus tiempos.</p>
        <div id="admin-user-list"></div>
        <button onclick="showApp()" class="btn-ghost">Volver a mi perfil</button>
    </div>
</div>

<script>
    let user = null;
    let isRegister = false;
    let startTime = null;
    let timerInt = null;

    function toggleMode() {
        isRegister = !isRegister;
        document.getElementById('auth-title').innerText = isRegister ? "Crear Cuenta" : "Diesel Colombia";
        document.getElementById('reg-fields').classList.toggle('hidden');
        document.getElementById('btn-main').innerText = isRegister ? "Registrarme" : "Iniciar Sesión";
        document.getElementById('btn-toggle').innerText = isRegister ? "¿Ya tienes cuenta? Entra" : "¿No tienes cuenta? Crea una";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const nombre = document.getElementById('reg-nombre').value;

        if (isRegister) {
            // REGISTRO
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombre, email, password })
            });
            if (res.ok) {
                Swal.fire({
                    title: '¡Cuenta creada!',
                    text: 'Ahora puedes iniciar sesión',
                    icon: 'success',
                    confirmButtonColor: '#0071e3'
                });
                toggleMode();
            }
        } else {
            // LOGIN
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.status === 404) {
                Swal.fire({
                    title: 'La cuenta no existe',
                    text: 'Verifica tu correo o regístrate',
                    icon: 'error',
                    showClass: { popup: 'animate__animated animate__shakeX' },
                    confirmButtonColor: '#0071e3'
                });
            } else if (res.status === 401) {
                Swal.fire({
                    title: 'Contraseña incorrecta',
                    text: 'Inténtalo de nuevo',
                    icon: 'warning',
                    confirmButtonColor: '#0071e3'
                });
            } else if (res.ok) {
                user = data;
                enterApp();
            }
        }
    }

    function enterApp() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-app').classList.remove('hidden');
        document.getElementById('navbar').classList.remove('hidden');
        document.getElementById('welcome-name').innerText = user.nombre;
        document.getElementById('user-pill').innerText = user.nombre;
        
        if (user.email === "emma2013rqgmail.com") {
            document.getElementById('admin-menu').classList.remove('hidden');
        }
    }

    function startClock() {
        const task = document.getElementById('task-input').value;
        if (!task) return Swal.fire('Escribe qué harás', '', 'info');
        
        startTime = new Date();
        document.getElementById('current-task-display').innerText = task;
        document.getElementById('work-setup').classList.add('hidden');
        document.getElementById('work-active').classList.remove('hidden');
        
        timerInt = setInterval(() => {
            const now = new Date();
            const d = new Date(now - startTime);
            document.getElementById('timer-display').innerText = d.toISOString().substr(11, 8);
        }, 1000);
    }

    async function stopClock() {
        clearInterval(timerInt);
        const end = new Date();
        await fetch('/api/tiempo', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                usuario_id: user.id,
                actividad: document.getElementById('current-task-display').innerText,
                inicio: startTime.toLocaleTimeString(),
                fin: end.toLocaleTimeString(),
                fecha: new Date().toLocaleDateString()
            })
        });
        Swal.fire('Tiempo registrado', 'Buen trabajo', 'success').then(() => location.reload());
    }

    async function loadHistory(id, nombre = "Tu Historial") {
        const res = await fetch(`/api/tiempos/${id}`);
        const data = await res.json();
        const list = document.getElementById('history-list');
        document.getElementById('history-card').classList.remove('hidden');
        document.getElementById('history-title').innerText = nombre;

        if (data.length === 0) {
            list.innerHTML = "<p style='color:gray'>No tiene tiempo de trabajo.</p>";
        } else {
            list.innerHTML = data.map(t => `
                <div style="padding:15px 0; border-bottom:1px solid #eee;">
                    <div style="font-weight:600">${t.actividad}</div>
                    <div style="font-size:13px; color:gray">${t.fecha} • ${t.hora_inicio} a ${t.hora_fin}</div>
                </div>
            `).join('');
        }
    }

    async function showAdmin() {
        document.getElementById('view-app').classList.add('hidden');
        document.getElementById('view-admin').classList.remove('hidden');
        const res = await fetch('/api/admin/usuarios');
        const users = await res.json();
        const list = document.getElementById('admin-user-list');
        list.innerHTML = users.map(u => `
            <div class="user-item">
                <div><strong>${u.nombre}</strong><br><small>${u.email}</small></div>
                <button onclick="loadHistory(${u.id}, 'Tiempos de ${u.nombre}')" style="width:auto; padding:5px 12px; font-size:12px;">Auditar</button>
            </div>
        `).join('');
    }

    function showApp() {
        document.getElementById('view-admin').classList.add('hidden');
        document.getElementById('view-app').classList.remove('hidden');
    }
</script>
</body>
</html>
