<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Activos | Apple Design</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        :root {
            --blue: #007AFF;
            --gray: #F5F5F7;
            --dark: #1D1D1F;
            --red: #FF3B30;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }

        body { 
            background: var(--gray);
            color: var(--dark);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* Card Principal */
        .apple-container {
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(200%);
            border-radius: 28px;
            padding: 45px 35px;
            width: 95%; max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center;
            position: relative;
        }

        h1 { font-size: 30px; font-weight: 700; letter-spacing: -1.2px; margin-bottom: 8px; }
        .sub { color: #86868b; font-size: 15px; margin-bottom: 30px; }

        /* Form Estilos */
        .group { margin-bottom: 18px; text-align: left; }
        label { font-size: 11px; font-weight: 700; margin-left: 14px; text-transform: uppercase; color: #1d1d1f; }
        input {
            width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.4); font-size: 16px; outline: none; margin-top: 5px;
        }
        input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }

        /* Botones Pro */
        .btn {
            width: 100%; padding: 15px; border-radius: 14px; border: none; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-blue { background: var(--blue); color: white; }
        .btn-blue:hover { opacity: 0.9; }
        
        /* Reloj */
        .clock-screen { background: #000; color: #fff; border-radius: 20px; padding: 40px 10px; margin: 25px 0; }
        .clock-time { font-size: 55px; font-weight: 700; font-variant-numeric: tabular-nums; }

        /* Panel de Auditoría (Sub-página interna) */
        .audit-page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; border-radius: 28px; padding: 30px; z-index: 50;
            display: flex; flex-direction: column; text-align: left;
        }

        .user-item {
            background: #f9f9fb; padding: 15px; border-radius: 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(0,0,0,0.02); transition: 0.2s;
        }
        .user-item:hover { background: #f2f2f7; }

        .btn-icon-red { color: var(--red); background: none; border: none; cursor: pointer; font-size: 18px; padding: 10px; }
        .btn-back { color: var(--blue); background: none; border: none; cursor: pointer; font-weight: 600; margin-bottom: 20px; }

        .scroll-list { overflow-y: auto; flex-grow: 1; margin-top: 10px; }
    </style>
</head>
<body>

<div class="apple-container">
    <div id="auth-ui">
        <h1>Identificación</h1>
        <p class="sub">Acceso al Sistema de Control</p>
        
        <div id="reg-box" class="hidden">
            <div class="group"><label>Nombre Completo</label><input type="text" id="n-name"></div>
        </div>
        <div class="group"><label>Correo</label><input type="email" id="n-email"></div>
        <div class="group"><label>Password</label><input type="password" id="n-pass"></div>
        
        <button class="btn btn-blue" onclick="auth()">Continuar</button>
        <button onclick="toggleAuth()" id="t-auth" style="background:none; border:none; color:var(--blue); margin-top:20px; cursor:pointer; font-size:14px;">¿No tienes cuenta? Regístrate</button>
    </div>

    <div id="dash-ui" class="hidden animate__animated animate__fadeIn">
        <h2 id="u-welcome" style="font-size: 26px; letter-spacing: -1px;">Hola</h2>
        <p class="sub">Registro de jornada activo</p>

        <div id="pre-clock">
            <div class="group">
                <label>Proyecto</label>
                <input type="text" id="p-task" placeholder="Ej: Voy a hacer una iglesia">
            </div>
            <button class="btn btn-blue" onclick="start()"><i class="fa fa-play"></i> Iniciar Tarea</button>
            
            <button id="adm-btn" class="btn hidden" style="margin-top:12px; background:#1d1d1f; color:#fff;" onclick="loadUsers()">
                <i class="fa fa-users"></i> Panel Auditoría
            </button>
            <button onclick="logout()" style="background:none; border:none; color:var(--red); margin-top:20px; cursor:pointer; font-weight:600;">Cerrar Sesión</button>
        </div>

        <div id="clock-ui" class="hidden">
            <div class="clock-screen">
                <div class="clock-time" id="chrono">00:00:00</div>
            </div>
            <button class="btn btn-blue" style="background:var(--red)" onclick="stop()">
                <i class="fa fa-stop"></i> Finalizar Registro
            </button>
        </div>
    </div>

    <div id="audit-ui" class="audit-page hidden animate__animated animate__slideInRight">
        <button class="btn-back" onclick="closeAudit()"><i class="fa fa-chevron-left"></i> Panel de Control</button>
        <h2 style="font-size: 24px; margin-bottom: 5px;">Usuarios</h2>
        <p class="sub" style="margin-bottom: 15px;">Gestionar cuentas y tiempos</p>
        <div id="user-list" class="scroll-list"></div>
    </div>

    <div id="times-ui" class="audit-page hidden animate__animated animate__slideInRight">
        <button class="btn-back" onclick="backToUsers()"><i class="fa fa-chevron-left"></i> Lista de Usuarios</button>
        <h2 id="audit-title" style="font-size: 24px;">Historial</h2>
        <div id="times-list" class="scroll-list"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    let user = null;
    let isReg = false;
    let interval = null;
    let startTime = null;

    function toggleAuth() {
        isReg = !isReg;
        document.getElementById('reg-box').classList.toggle('hidden');
        document.getElementById('t-auth').innerText = isReg ? 'Ya tengo cuenta' : '¿No tienes cuenta? Regístrate';
    }

    async function auth() {
        const email = document.getElementById('n-email').value;
        const password = document.getElementById('n-pass').value;
        const nombre = document.getElementById('n-name').value;
        const path = isReg ? '/api/auth/register' : '/api/auth/login';

        try {
            const res = await fetch(path, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombre, email, password })
            });
            const data = await res.json();
            if (res.ok) {
                if (isReg) { Swal.fire('Éxito', 'Creado', 'success'); toggleAuth(); }
                else { user = data; localStorage.setItem('ses', JSON.stringify(data)); goDash(); }
            } else { Swal.fire('Error', data.error, 'error'); }
        } catch (e) { Swal.fire('Error 502', 'Servidor reiniciando. Espera 10 segundos.', 'warning'); }
    }

    function goDash() {
        document.getElementById('auth-ui').classList.add('hidden');
        document.getElementById('dash-ui').classList.remove('hidden');
        document.getElementById('u-welcome').innerText = "Hola, " + user.nombre;
        if (user.email === MASTER) document.getElementById('adm-btn').classList.remove('hidden');
    }

    function start() {
        if (!document.getElementById('p-task').value) return Swal.fire('Aviso', 'Escribe el proyecto', 'info');
        startTime = new Date();
        document.getElementById('pre-clock').classList.add('hidden');
        document.getElementById('clock-ui').classList.remove('hidden');
        interval = setInterval(() => {
            const diff = new Date(new Date() - startTime);
            document.getElementById('chrono').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    async function stop() {
        clearInterval(interval);
        const duracion = document.getElementById('chrono').innerText;
        const proyecto = document.getElementById('p-task').value;

        try {
            const res = await fetch('/api/tiempo/guardar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ usuario_id: user.id, proyecto, duracion })
            });
            if (res.ok) Swal.fire('Guardado', 'Registro exitoso', 'success').then(() => location.reload());
            else throw new Error();
        } catch (e) { Swal.fire('Error', 'No se pudo guardar. Verifica tu conexión.', 'error'); }
    }

    // --- LÓGICA DE AUDITORÍA ---
    async function loadUsers() {
        document.getElementById('audit-ui').classList.remove('hidden');
        const res = await fetch(`/api/admin/usuarios?admin_email=${user.email}`);
        const list = await res.json();
        const box = document.getElementById('user-list');
        box.innerHTML = list.map(u => `
            <div class="user-item">
                <div onclick="showDetail(${u.id}, '${u.nombre}')" style="cursor:pointer; flex-grow:1">
                    <b>${u.nombre}</b><br><small style="color:#86868b">${u.email}</small>
                </div>
                <button class="btn-icon-red" onclick="delUser(${u.id})"><i class="fa fa-trash-can"></i></button>
            </div>
        `).join('');
    }

    async function showDetail(uid, name) {
        document.getElementById('times-ui').classList.remove('hidden');
        document.getElementById('audit-title').innerText = name;
        const res = await fetch(`/api/admin/detalles/${uid}?admin_email=${user.email}`);
        const data = await res.json();
        const box = document.getElementById('times-list');
        box.innerHTML = data.map(t => `
            <div style="border-bottom:1px solid #eee; padding:12px 0;">
                <b style="font-size:14px">${t.proyecto}</b><br>
                <small>${t.fecha}</small> <b style="float:right; color:var(--blue)">${t.duracion}</b>
            </div>
        `).join('') || '<p class="sub">Sin registros.</p>';
    }

    async function delUser(id) {
        const s = await Swal.fire({ title: '¿Eliminar cuenta?', showCancelButton: true, confirmButtonColor: '#FF3B30' });
        if (s.isConfirmed) {
            await fetch(`/api/admin/usuarios/${id}?admin_email=${user.email}`, { method: 'DELETE' });
            loadUsers();
        }
    }

    function closeAudit() { document.getElementById('audit-ui').classList.add('hidden'); }
    function backToUsers() { document.getElementById('times-ui').classList.add('hidden'); }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const s = localStorage.getItem('ses');
        if (s) { user = JSON.parse(s); goDash(); }
    };
</script>
</body>
</html>
