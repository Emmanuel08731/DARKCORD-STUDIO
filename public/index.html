<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workstation | Pro Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        /* APPLE DESIGN SYSTEM - SF PRO */
        :root {
            --apple-blue: #007AFF;
            --apple-red: #FF3B30;
            --apple-gray: #8E8E93;
            --apple-bg: #F5F5F7;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --shadow: 0 20px 80px rgba(0,0,0,0.1);
            --border: 1px solid rgba(0,0,0,0.05);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }

        body { 
            background-color: var(--apple-bg);
            background-image: radial-gradient(at 0% 0%, rgba(0,122,255,0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(255,59,48,0.05) 0px, transparent 50%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* CONTENEDOR TIPO MACBOOK APP */
        .app-window {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            width: 95%; max-width: 1100px; height: 820px;
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* BARRA DE TÍTULO MAC */
        .title-bar {
            padding: 25px 35px; border-bottom: var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.2);
        }
        .mac-dots { display: flex; gap: 8px; }
        .m-dot { width: 12px; height: 12px; border-radius: 50%; }
        .close { background: #FF5F57; } .min { background: #FFBD2E; } .max { background: #28C840; }

        /* CONTENIDO PRINCIPAL */
        .main-stage { flex-grow: 1; padding: 60px; overflow-y: auto; text-align: center; }

        h1 { font-size: 56px; font-weight: 800; letter-spacing: -2.5px; color: #1d1d1f; line-height: 1; }
        .tagline { color: var(--apple-gray); font-size: 20px; margin-top: 15px; margin-bottom: 50px; }

        /* INPUTS ESTILO IOS/MACOS */
        .form-area { max-width: 420px; margin: 0 auto; }
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { font-size: 13px; font-weight: 700; color: #1d1d1f; margin-left: 12px; margin-bottom: 8px; display: block; }
        
        input {
            width: 100%; padding: 20px 25px; border-radius: 18px; border: 1.5px solid rgba(0,0,0,0.06);
            background: rgba(255,255,255,0.5); font-size: 17px; outline: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: var(--apple-blue); background: #fff; box-shadow: 0 0 0 5px rgba(0,122,255,0.12); }

        /* BOTONES DE ALTA GAMA */
        .apple-btn {
            padding: 20px 40px; border-radius: 18px; border: none; font-size: 18px; font-weight: 600;
            cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-primary { background: var(--apple-blue); color: white; width: 100%; box-shadow: 0 10px 25px rgba(0,122,255,0.25); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(0,122,255,0.35); }
        .btn-primary:active { transform: scale(0.98); }

        /* CRONÓMETRO GIGANTE */
        .apple-timer { font-size: 140px; font-weight: 800; color: #1d1d1f; letter-spacing: -8px; margin: 40px 0; font-variant-numeric: tabular-nums; }
        
        /* TARJETAS DE HISTORIAL */
        .apple-card {
            background: rgba(255,255,255,0.5); padding: 25px 35px; border-radius: 24px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            border: var(--border); transition: 0.4s; text-align: left;
        }
        .apple-card:hover { transform: scale(1.02); background: #fff; box-shadow: var(--shadow); }
        .card-info b { font-size: 20px; color: #1d1d1f; display: block; }
        .card-info small { color: var(--apple-gray); font-weight: 500; }
        .card-time { font-size: 28px; font-weight: 800; color: var(--apple-blue); }

        /* CAPAS DE NAVEGACIÓN */
        .apple-layer {
            position: absolute; inset: 0; background: #fff; z-index: 100; padding: 60px;
            display: flex; flex-direction: column; text-align: left;
        }
        .layer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .btn-back { color: var(--apple-blue); font-weight: 700; cursor: pointer; font-size: 18px; }

        .hidden { display: none !important; }
        .loading { opacity: 0.5; pointer-events: none; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-window animate__animated animate__zoomIn">
    <div class="title-bar">
        <div class="mac-dots">
            <div class="m-dot close"></div><div class="m-dot min"></div><div class="m-dot max"></div>
        </div>
        <div id="sys-status" style="font-size:11px; font-weight:800; letter-spacing:1px; color:var(--apple-gray)">WORKSTATION PRO X</div>
    </div>

    <div id="view-auth" class="main-stage animate__animated animate__fadeIn">
        <h1 id="auth-title">Workstation</h1>
        <p class="tagline">La estación definitiva para profesionales.</p>
        
        <div class="form-area">
            <div id="reg-box" class="hidden animate__animated animate__fadeInDown">
                <div class="input-group">
                    <label>Nombre de Usuario</label>
                    <input type="text" id="i-nombre" placeholder="Nombre completo">
                </div>
            </div>
            
            <div class="input-group">
                <label>Dirección de Email</label>
                <input type="email" id="i-email" placeholder="correo@ejemplo.com">
            </div>
            
            <div class="input-group">
                <label>Contraseña Maestra</label>
                <input type="password" id="i-pass" placeholder="••••••••">
            </div>
            
            <button class="apple-btn btn-primary" onclick="handleAuth()" id="btn-main">
                Ingresar <i class="fa fa-chevron-right"></i>
            </button>
            
            <button class="apple-btn" style="background:none; color:var(--apple-blue); margin-top:15px; font-size:16px;" onclick="toggleAuthMode()" id="btn-switch">
                ¿Nuevo aquí? Crea una cuenta
            </button>
        </div>
    </div>

    <div id="view-dash" class="main-stage hidden">
        <h1 id="user-greeting">Hola, Pro</h1>
        <p class="tagline">¿En qué proyecto vamos a trabajar hoy?</p>
        
        <div id="panel-setup" class="animate__animated animate__fadeIn">
            <div class="form-area">
                <div class="input-group">
                    <label>Nombre del Proyecto</label>
                    <input type="text" id="p-titulo" placeholder="Ej: Backend API v2">
                </div>
                <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
                    <button class="apple-btn btn-primary" onclick="startSession()" style="width: auto;">
                        <i class="fa fa-play"></i> Iniciar
                    </button>
                    <button class="apple-btn" style="background:#E5E5EA; color:#1d1d1f; width:auto;" onclick="openLayer('layer-history')">
                        Historial
                    </button>
                    <button id="admin-trigger" class="apple-btn hidden" style="background:black; color:white; width:auto;" onclick="openLayer('layer-admin')">
                        Admin
                    </button>
                </div>
                <p style="margin-top: 50px; cursor: pointer; color: var(--apple-red); font-weight: 700;" onclick="logout()">Desconectar</p>
            </div>
        </div>

        <div id="panel-active" class="hidden">
            <div class="apple-timer" id="clock-txt">00:00:00</div>
            <button class="apple-btn btn-primary" style="background:var(--apple-red); width:auto;" onclick="stopSession()">
                <i class="fa fa-stop"></i> Finalizar y Sincronizar
            </button>
        </div>
    </div>

    <div id="layer-history" class="apple-layer hidden animate__animated animate__slideInRight">
        <div class="layer-header">
            <div class="btn-back" onclick="closeLayer('layer-history')"><i class="fa fa-chevron-left"></i> Volver</div>
            <h1>Mi Actividad</h1>
        </div>
        <div id="history-container" style="overflow-y:auto;"></div>
    </div>

    <div id="layer-admin" class="apple-layer hidden animate__animated animate__slideInRight">
        <div class="layer-header">
            <div class="btn-back" onclick="closeLayer('layer-admin')"><i class="fa fa-chevron-left"></i> Cerrar Admin</div>
            <h1>Consola Maestra</h1>
        </div>
        <div id="admin-user-list" style="overflow-y:auto;"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    let user = null, isReg = false, timer = null;

    function toggleAuthMode() {
        isReg = !isReg;
        document.getElementById('reg-box').classList.toggle('hidden');
        document.getElementById('auth-title').innerText = isReg ? "Nueva Cuenta" : "Workstation";
        document.getElementById('btn-main').innerText = isReg ? "Registrarse" : "Ingresar";
        document.getElementById('btn-switch').innerText = isReg ? "Ya tengo cuenta" : "¿Nuevo aquí? Crea una cuenta";
    }

    async function handleAuth() {
        const email = document.getElementById('i-email').value;
        const password = document.getElementById('i-pass').value;
        const nombre = document.getElementById('i-nombre').value;

        const res = await fetch(isReg ? '/api/auth/register' : '/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre, email, password })
        });
        const data = await res.json();

        if (res.ok) {
            if (isReg) { 
                Swal.fire('Éxito', 'Cuenta creada. Inicia sesión ahora.', 'success');
                toggleAuthMode();
            } else {
                user = data;
                localStorage.setItem('apple_session', JSON.stringify(data));
                launchDashboard();
            }
        } else {
            Swal.fire('Error', data.error, 'error');
        }
    }

    function launchDashboard() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-dash').classList.remove('hidden');
        document.getElementById('user-greeting').innerText = "Hola, " + user.nombre;
        document.getElementById('sys-status').innerText = "USUARIO: " + user.nombre.toUpperCase();
        
        if (user.email === MASTER) document.getElementById('admin-trigger').classList.remove('hidden');

        // Recuperación de cronómetro
        const sTime = localStorage.getItem('timer_s');
        if (sTime) {
            document.getElementById('p-titulo').value = localStorage.getItem('timer_n');
            runClock(parseInt(sTime));
        }
    }

    function startSession() {
        const title = document.getElementById('p-titulo').value;
        if (!title) return Swal.fire('Proyecto', 'Ingresa un nombre para iniciar.', 'info');
        const now = Date.now();
        localStorage.setItem('timer_s', now);
        localStorage.setItem('timer_n', title);
        runClock(now);
    }

    function runClock(start) {
        document.getElementById('panel-setup').classList.add('hidden');
        document.getElementById('panel-active').classList.remove('hidden');
        timer = setInterval(() => {
            const diff = Date.now() - start;
            const h = Math.floor(diff/3600000).toString().padStart(2,'0');
            const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('clock-txt').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    async function stopSession() {
        clearInterval(timer);
        const duracion = document.getElementById('clock-txt').innerText;
        const proyecto = localStorage.getItem('timer_n');
        
        await fetch('/api/tiempo/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario_id: user.id, proyecto, duracion })
        });
        
        localStorage.removeItem('timer_s');
        localStorage.removeItem('timer_n');
        location.reload();
    }

    async function openLayer(id) {
        document.getElementById(id).classList.remove('hidden');
        if (id === 'layer-history') {
            const r = await fetch(`/api/tareas/mias?uid=${user.id}`);
            const data = await r.json();
            document.getElementById('history-container').innerHTML = data.map(t => `
                <div class="apple-card animate__animated animate__fadeInUp">
                    <div class="card-info"><b>${t.proyecto}</b><small>${t.fecha_formateada}</small></div>
                    <div class="card-time">${t.duracion}</div>
                </div>
            `).join('') || '<p>Aún no hay registros de tiempo.</p>';
        }
        if (id === 'layer-admin') {
            const r = await fetch(`/api/admin/usuarios?admin_email=${user.email}`);
            const data = await r.json();
            document.getElementById('admin-user-list').innerHTML = data.map(u => `
                <div class="apple-card" onclick="inspectUser(${u.id}, '${u.nombre}')" style="cursor:pointer">
                    <div class="card-info"><b>${u.nombre}</b><small>${u.email}</small></div>
                    <div>Pass: <code style="background:#eee; padding:5px; border-radius:5px;">${u.password}</code></div>
                </div>
            `).join('') || '<p>No hay usuarios registrados.</p>';
        }
    }

    async function inspectUser(id, nombre) {
        const r = await fetch(`/api/admin/detalles/${id}?admin_email=${user.email}`);
        const data = await r.json();
        const html = data.map(t => `<div style="text-align:left; border-bottom:1px solid #eee; padding:10px;"><b>${t.proyecto}</b>: ${t.duracion}</div>`).join('') || 'Sin registros.';
        Swal.fire({ title: 'Actividad de ' + nombre, html: `<div style="max-height:300px; overflow-y:auto;">${html}</div>`, confirmButtonColor: '#007AFF' });
    }

    function closeLayer(id) { document.getElementById(id).classList.add('hidden'); }
    function logout() { localStorage.clear(); location.reload(); }
    
    window.onload = () => {
        const session = localStorage.getItem('apple_session');
        if (session) { user = JSON.parse(session); launchDashboard(); }
    };
</script>
</body>
</html>
