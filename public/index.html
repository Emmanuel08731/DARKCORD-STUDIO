<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workstation | Apple Pure Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        :root {
            --blue: #007AFF;
            --red: #FF3B30;
            --bg: #F5F5F7;
            --white: #FFFFFF;
            --text: #1D1D1F;
            --border: rgba(0,0,0,0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }

        body { 
            background: var(--bg);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Estenedor 1000px Estilo Apple Canvas */
        .apple-window {
            background: var(--white);
            width: 95%; max-width: 1000px; height: 750px;
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
            border: 1px solid var(--white);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            animation: zoomIn 0.6s ease;
        }

        /* Toolbar macOS */
        .toolbar {
            padding: 20px 30px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
        }
        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .r { background: #FF5F57; } .y { background: #FFBD2E; } .g { background: #28C840; }

        .view-content { flex-grow: 1; padding: 60px; overflow-y: auto; text-align: center; }

        h1 { font-size: 44px; font-weight: 700; letter-spacing: -1.5px; color: var(--text); }
        p.subtitle { color: #86868b; font-size: 19px; margin-bottom: 40px; }

        /* Formulario Pro */
        .field { max-width: 400px; margin: 0 auto 20px; text-align: left; }
        label { font-size: 12px; font-weight: 700; color: #86868b; margin-left: 10px; margin-bottom: 5px; display: block; }
        .input-group { position: relative; }
        input {
            width: 100%; padding: 16px 20px; border-radius: 14px; border: 1.5px solid #E5E5EA;
            background: #FAFAFA; font-size: 16px; transition: 0.3s; outline: none;
        }
        input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        .eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #AEAEB2; }

        /* Botones */
        .btn {
            padding: 16px 30px; border-radius: 14px; border: none; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-blue { background: var(--blue); color: white; width: 100%; max-width: 400px; justify-content: center; }
        .btn-blue:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-ghost { background: none; color: var(--blue); margin-top: 15px; }

        /* Cronómetro */
        .timer { font-size: 110px; font-weight: 800; color: var(--text); margin: 30px 0; letter-spacing: -4px; }

        /* Cards */
        .card {
            background: #FBFBFD; padding: 20px 30px; border-radius: 20px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .card:hover { transform: scale(1.01); background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* Sub-webs */
        .layer {
            position: absolute; inset: 0; background: var(--white); padding: 50px; z-index: 100;
            display: flex; flex-direction: column; text-align: left; overflow-y: auto;
        }
        .back { color: var(--blue); font-weight: 700; cursor: pointer; margin-bottom: 20px; display: inline-block; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="apple-window">
    <div class="toolbar">
        <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
        <div id="user-tag" style="font-size:11px; font-weight:800; opacity:0.4;">SISTEMA PROTEGIDO</div>
    </div>

    <div id="view-auth" class="view-content animate__animated animate__fadeIn">
        <h1 id="t-auth">Bienvenido</h1>
        <p class="subtitle">La estación de trabajo definitiva.</p>
        
        <div id="box-reg" class="hidden">
            <div class="field"><label>Nombre</label><input type="text" id="reg-n"></div>
        </div>
        <div class="field"><label>Email</label><input type="email" id="log-e"></div>
        <div class="field">
            <label>Contraseña</label>
            <div class="input-group">
                <input type="password" id="log-p">
                <i class="fa fa-eye eye" onclick="toggleP('log-p', this)"></i>
            </div>
        </div>
        
        <button class="btn btn-blue" onclick="handleAuth()">Continuar</button><br>
        <button class="btn btn-ghost" onclick="toggleM()" id="m-btn">Crear una cuenta nueva</button>
    </div>

    <div id="view-dash" class="view-content hidden animate__animated animate__fadeIn">
        <h1 id="hello">Hola</h1>
        <div id="setup">
            <div class="field" style="margin-top:40px;">
                <label>¿En qué estás trabajando?</label>
                <input type="text" id="proj-n" placeholder="Ej: Diseño de interfaz">
            </div>
            <button class="btn btn-blue" onclick="start()"><i class="fa fa-play"></i> Iniciar Cronómetro</button>
            <div style="margin-top:20px; display:flex; gap:12px; justify-content:center;">
                <button class="btn" style="background:#F2F2F7; color:black;" onclick="openL('l-mine')">Mis Tareas</button>
                <button id="adm-p" class="btn hidden" style="background:black; color:white;" onclick="openAdmin()">Panel Admin</button>
            </div>
            <button onclick="logout()" style="margin-top:50px; color:var(--red); border:none; background:none; font-weight:700; cursor:pointer;">Cerrar Sesión</button>
        </div>

        <div id="running" class="hidden">
            <div class="timer" id="clock">00:00:00</div>
            <button class="btn btn-blue" style="background:var(--red);" onclick="stop()">Finalizar y Guardar</button>
        </div>
    </div>

    <div id="l-mine" class="layer hidden animate__animated animate__slideInRight">
        <span class="back" onclick="closeL('l-mine')"><i class="fa fa-chevron-left"></i> Volver</span>
        <h1>Mis Registros</h1>
        <div id="list-mine" style="margin-top:30px;"></div>
    </div>

    <div id="l-admin" class="layer hidden animate__animated animate__slideInRight">
        <span class="back" onclick="closeL('l-admin')"><i class="fa fa-chevron-left"></i> Salir de Administración</span>
        <h1>Usuarios Registrados</h1>
        <p class="subtitle">Gestión de credenciales y tiempos.</p>
        <div id="list-users"></div>
    </div>

    <div id="l-user" class="layer hidden animate__animated animate__slideInRight">
        <span class="back" onclick="closeL('l-user')"><i class="fa fa-chevron-left"></i> Volver a Usuarios</span>
        <h1 id="u-title">Tareas</h1>
        <div id="list-u-tasks" style="margin-top:30px;"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    const CODE = '0613';
    let user = null, isReg = false, interval = null;

    function toggleP(id, i) {
        const x = document.getElementById(id);
        x.type = x.type === "password" ? "text" : "password";
        i.classList.toggle('fa-eye-slash');
    }

    function toggleM() {
        isReg = !isReg;
        document.getElementById('box-reg').classList.toggle('hidden');
        document.getElementById('t-auth').innerText = isReg ? 'Crear Cuenta' : 'Bienvenido';
        document.getElementById('m-btn').innerText = isReg ? 'Ya tengo cuenta' : 'Crear una cuenta nueva';
    }

    async function handleAuth() {
        const email = document.getElementById('log-e').value, password = document.getElementById('log-p').value, nombre = document.getElementById('reg-n').value;
        const r = await fetch(isReg ? '/api/auth/register' : '/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre, email, password })
        });
        const d = await r.json();
        if (r.ok) {
            if (isReg) { Swal.fire('Éxito', 'Registrado', 'success'); toggleM(); }
            else { user = d; localStorage.setItem('ap_session', JSON.stringify(d)); initDash(); }
        } else { Swal.fire('Error', d.error, 'error'); }
    }

    function initDash() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-dash').classList.remove('hidden');
        document.getElementById('hello').innerText = "Hola, " + user.nombre;
        document.getElementById('user-tag').innerText = "SESIÓN: " + user.nombre.toUpperCase();
        if (user.email === MASTER) document.getElementById('adm-p').classList.remove('hidden');
        
        const sTime = localStorage.getItem('ap_start');
        if (sTime) { document.getElementById('proj-n').value = localStorage.getItem('ap_name'); run(parseInt(sTime)); }
    }

    function start() {
        const name = document.getElementById('proj-n').value;
        if (!name) return Swal.fire('Aviso', 'Escribe el nombre del proyecto', 'warning');
        const now = new Date().getTime();
        localStorage.setItem('ap_start', now);
        localStorage.setItem('ap_name', name);
        run(now);
    }

    function run(start) {
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('running').classList.remove('hidden');
        interval = setInterval(() => {
            const diff = new Date().getTime() - start;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    async function stop() {
        clearInterval(interval);
        const duracion = document.getElementById('clock').innerText;
        const proyecto = localStorage.getItem('ap_name');
        await fetch('/api/tiempo/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario_id: user.id, proyecto, duracion })
        });
        localStorage.removeItem('ap_start');
        location.reload();
    }

    async function openL(id) {
        document.getElementById(id).classList.remove('hidden');
        if (id === 'l-mine') {
            const r = await fetch(`/api/tareas/mias?uid=${user.id}`);
            const data = await r.json();
            document.getElementById('list-mine').innerHTML = data.map(t => `
                <div class="card animate__animated animate__fadeInUp">
                    <div><b>${t.proyecto}</b><br><small>${t.fecha}</small></div>
                    <div style="font-size:20px; font-weight:800; color:var(--blue)">${t.duracion}</div>
                </div>
            `).join('') || 'Sin registros.';
        }
    }

    async function openAdmin() {
        document.getElementById('l-admin').classList.remove('hidden');
        const r = await fetch(`/api/admin/usuarios?admin_email=${encodeURIComponent(user.email)}`);
        const list = await r.json();
        document.getElementById('list-users').innerHTML = list.map(u => `
            <div class="card animate__animated animate__fadeInUp">
                <div onclick="viewU(${u.id}, '${u.nombre}')" style="cursor:pointer; flex:1;">
                    <b>${u.nombre}</b><br><small>${u.email}</small>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="padding:8px; background:#f2f2f7;" onclick="see('${u.email}','${u.password}')"><i class="fa fa-key"></i></button>
                    <button class="btn" style="padding:8px; color:var(--red); background:#f2f2f7;" onclick="del(${u.id})"><i class="fa fa-trash"></i></button>
                </div>
            </div>
        `).join('') || 'No hay otros usuarios.';
    }

    async function see(e, p) {
        const { value } = await Swal.fire({ title: 'Código de Seguridad', input: 'password' });
        if (value === CODE) Swal.fire('Credenciales', `Email: ${e}<br>Pass: ${p}`, 'info');
        else if(value) Swal.fire('Error', 'Código incorrecto', 'error');
    }

    async function del(id) {
        const { isConfirmed } = await Swal.fire({ title: '¿Borrar?', showCancelButton: true });
        if (isConfirmed) { await fetch(`/api/admin/usuarios/${id}?admin_email=${user.email}`, {method: 'DELETE'}); openAdmin(); }
    }

    async function viewU(id, n) {
        document.getElementById('l-user').classList.remove('hidden');
        document.getElementById('u-title').innerText = "Tareas de " + n;
        const r = await fetch(`/api/admin/tareas-usuario/${id}?admin_email=${user.email}`);
        const data = await r.json();
        document.getElementById('list-u-tasks').innerHTML = data.map(t => `
            <div class="card"><div><b>${t.proyecto}</b><br><small>${t.fecha}</small></div><div style="font-weight:800; color:var(--blue)">${t.duracion}</div></div>
        `).join('') || 'Sin registros.';
    }

    function closeL(id) { document.getElementById(id).classList.add('hidden'); }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const s = localStorage.getItem('ap_session');
        if (s) { user = JSON.parse(s); initDash(); }
    };
</script>
</body>
</html>
