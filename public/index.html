<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity OS | Diesel Styles</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        :root {
            --primary: #0071e3;
            --danger: #ff3b30;
            --accent: #5e5ce6;
            --glass: rgba(255, 255, 255, 0.7);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'SF Pro Display', -apple-system, sans-serif; }
        body { 
            background: radial-gradient(circle at top right, #e2e2e2, #ffffff);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }
        .hidden { display: none !important; }

        /* Barra Superior */
        nav {
            width: 100%; padding: 15px 40px; background: rgba(255,255,255,0.5);
            backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center; position: fixed; top:0; z-index: 100;
        }

        /* Contenedor Principal */
        .container { margin-top: 100px; width: 100%; max-width: 450px; padding: 20px; }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(30px);
            border-radius: 35px; padding: 40px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); text-align: center;
        }

        /* Estilo Inputs */
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-left: 10px; }
        input {
            width: 100%; padding: 16px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.6); font-size: 16px; margin-top: 5px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); background: #fff; }

        /* Botones */
        .btn {
            width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 16px;
            font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,113,227,0.3); }
        .btn-ghost { background: transparent; color: var(--primary); }

        /* Cronómetro */
        .timer-display {
            background: #1d1d1f; color: #fff; border-radius: 25px;
            padding: 40px 10px; margin: 25px 0; font-size: 55px; font-weight: 800;
            letter-spacing: -2px; font-variant-numeric: tabular-nums;
        }

        /* Admin Screen */
        .admin-screen {
            position: fixed; inset: 0; background: #f5f5f7; z-index: 200;
            padding: 60px 20px; overflow-y: auto;
        }
        .user-row {
            background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .user-row:hover { border-color: var(--primary); transform: scale(1.02); }

        /* Modal de Auditoría */
        .audit-list { text-align: left; margin-top: 20px; }
        .audit-item { 
            border-bottom: 1px solid #eee; padding: 10px 0; 
            display: flex; justify-content: space-between; font-size: 13px;
        }
    </style>
</head>
<body>

<nav id="navbar" class="hidden">
    <div style="font-weight: 900; font-size: 20px;">DIESEL <span style="color:var(--primary)">OS</span></div>
    <div id="nav-user" style="font-size: 12px; font-weight: 700;"></div>
</nav>

<div class="container">
    <div id="auth-ui" class="glass-card animate__animated animate__fadeIn">
        <h1 style="font-size: 40px; letter-spacing: -2px; margin-bottom: 5px;">Infinity</h1>
        <p style="color:#86868b; margin-bottom: 30px;">Inicia sesión para continuar</p>
        
        <div id="reg-extra" class="hidden">
            <div class="input-group"><label>Nombre</label><input type="text" id="auth-name" placeholder="Tu nombre"></div>
        </div>
        <div class="input-group"><label>Email</label><input type="email" id="auth-email" placeholder="correo@diesel.com"></div>
        <div class="input-group"><label>Password</label><input type="password" id="auth-pass" placeholder="••••••••"></div>
        
        <button class="btn btn-primary" onclick="processAuth()">Continuar</button>
        <button class="btn btn-ghost" onclick="toggleAuth()" id="auth-toggle">¿No tienes cuenta? Regístrate</button>
    </div>

    <div id="dash-ui" class="glass-card hidden animate__animated animate__fadeInUp">
        <h2 id="welcome-msg" style="font-size: 30px; letter-spacing: -1px;">Hola</h2>
        <p style="color:#86868b">Registra tu progreso de hoy</p>

        <div id="timer-setup">
            <div class="input-group" style="margin-top:20px;">
                <label>Proyecto Actual</label>
                <input type="text" id="project-name" placeholder="Ej: UI Design para Discord">
            </div>
            <button class="btn btn-primary" onclick="startWork()"><i class="fa fa-play"></i> Iniciar Jornada</button>
            <button id="admin-btn" class="btn hidden" style="margin-top:15px; background:#000; color:#fff;" onclick="loadAdmin()">
                <i class="fa fa-shield"></i> Panel de Auditoría
            </button>
            <button class="btn btn-ghost" onclick="logout()" style="margin-top:10px;">Cerrar Sesión</button>
        </div>

        <div id="timer-active" class="hidden">
            <div class="timer-display" id="clock">00:00:00</div>
            <button class="btn btn-primary" style="background:var(--danger)" onclick="stopWork()">
                <i class="fa fa-stop"></i> Finalizar y Guardar
            </button>
        </div>
    </div>
</div>

<div id="admin-ui" class="admin-screen hidden animate__animated animate__slideInUp">
    <div style="max-width: 450px; margin: 0 auto;">
        <button onclick="closeAdmin()" class="btn btn-ghost" style="width:auto;"><i class="fa fa-arrow-left"></i> Volver</button>
        <h1 style="margin: 20px 0; font-size: 35px; letter-spacing: -1.5px;">Usuarios</h1>
        <div id="user-list-container"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    let currentUser = null;
    let isReg = false;
    let timerInt = null;
    let startTime = null;

    function toggleAuth() {
        isReg = !isReg;
        document.getElementById('reg-extra').classList.toggle('hidden');
        document.getElementById('auth-toggle').innerText = isReg ? 'Ya tengo cuenta' : '¿No tienes cuenta? Regístrate';
    }

    async function processAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pass').value;
        const nombre = document.getElementById('auth-name').value;
        const url = isReg ? '/api/auth/register' : '/api/auth/login';

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombre, email, password })
            });
            const data = await res.json();
            if (res.ok) {
                if (isReg) { Swal.fire('Éxito', 'Registrado', 'success'); toggleAuth(); }
                else { 
                    currentUser = data; 
                    localStorage.setItem('user', JSON.stringify(data));
                    showDashboard(); 
                }
            } else { Swal.fire('Error', data.error, 'error'); }
        } catch (e) { Swal.fire('Error', 'Servidor Offline', 'error'); }
    }

    function showDashboard() {
        document.getElementById('auth-ui').classList.add('hidden');
        document.getElementById('navbar').classList.remove('hidden');
        document.getElementById('dash-ui').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "Hola, " + currentUser.nombre;
        document.getElementById('nav-user').innerText = currentUser.nombre.toUpperCase();
        if (currentUser.email === MASTER) document.getElementById('admin-btn').classList.remove('hidden');
    }

    function startWork() {
        if (!document.getElementById('project-name').value) return Swal.fire('Info', 'Escribe el proyecto', 'info');
        startTime = new Date();
        document.getElementById('timer-setup').classList.add('hidden');
        document.getElementById('timer-active').classList.remove('hidden');
        timerInt = setInterval(() => {
            const diff = new Date(new Date() - startTime);
            document.getElementById('clock').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    async function stopWork() {
        clearInterval(timerInt);
        const duracion = document.getElementById('clock').innerText;
        const proyecto = document.getElementById('project-name').value;

        await fetch('/api/tiempo/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario_id: currentUser.id, proyecto, duracion })
        });

        Swal.fire('Guardado', `Registraste ${duracion} en ${proyecto}`, 'success');
        location.reload();
    }

    async function loadAdmin() {
        document.getElementById('admin-ui').classList.remove('hidden');
        const res = await fetch(`/api/admin/usuarios?admin_email=${currentUser.email}`);
        const users = await res.json();
        const container = document.getElementById('user-list-container');
        container.innerHTML = users.map(u => `
            <div class="user-row" onclick="viewAudit(${u.id}, '${u.nombre}')">
                <div><b>${u.nombre}</b><br><small>${u.email}</small></div>
                <button onclick="event.stopPropagation(); deleteUser(${u.id})" class="btn" style="width:auto; color:var(--danger); padding:0; background:none;"><i class="fa fa-trash"></i></button>
            </div>
        `).join('');
    }

    async function viewAudit(id, name) {
        const res = await fetch(`/api/admin/tiempos/${id}?admin_email=${currentUser.email}`);
        const tiempos = await res.json();
        let html = '<div class="audit-list">';
        if (tiempos.length === 0) html += '<p>No hay registros aún.</p>';
        tiempos.forEach(t => {
            html += `
                <div class="audit-item">
                    <span><b>${t.proyecto}</b><br>${t.fecha_formateada}</span>
                    <span style="color:var(--primary); font-weight:800;">${t.duracion}</span>
                </div>
            `;
        });
        html += '</div>';
        Swal.fire({ title: 'Actividad de ' + name, html: html, confirmButtonText: 'Cerrar' });
    }

    async function deleteUser(id) {
        const c = await Swal.fire({ title: '¿Eliminar usuario?', showCancelButton: true });
        if (c.isConfirmed) {
            await fetch(`/api/admin/usuarios/${id}?admin_email=${currentUser.email}`, { method: 'DELETE' });
            loadAdmin();
        }
    }

    function logout() { localStorage.clear(); location.reload(); }
    function closeAdmin() { document.getElementById('admin-ui').classList.add('hidden'); }

    window.onload = () => {
        const saved = localStorage.getItem('user');
        if (saved) { currentUser = JSON.parse(saved); showDashboard(); }
    };
</script>
</body>
</html>
