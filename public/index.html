<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHACA | Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sf-bg: #f5f5f7;
            --sf-card: rgba(255, 255, 255, 0.72);
            --sf-text: #1d1d1f;
            --sf-label: #86868b;
            --sf-accent: #007aff;
            --sf-border: rgba(0, 0, 0, 0.1);
            --sf-blur: blur(40px) saturate(180%);
            --anim: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body { 
            background: linear-gradient(135deg, #f5f5f7 0%, #ffffff 100%);
            color: var(--sf-text);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- WALLPAPER GRADIENT (Fondo dinámico sutil) --- */
        .wallpaper {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(0, 122, 255, 0.05), transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(255, 45, 85, 0.03), transparent 30%);
            z-index: -1; pointer-events: none;
        }

        /* --- STATUS BAR (Top Right) --- */
        #status-pill {
            position: fixed; top: 18px; right: 24px; z-index: 3000;
            padding: 6px 14px; border-radius: 20px;
            background: var(--sf-card); border: 1px solid var(--sf-border);
            backdrop-filter: var(--sf-blur); font-size: 11px; font-weight: 600;
            display: flex; align-items: center; gap: 8px; transition: var(--anim);
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot.online { background: #34c759; box-shadow: 0 0 10px #34c759; }
        .dot.offline { background: #ff3b30; box-shadow: 0 0 10px #ff3b30; }

        /* --- NAVIGATION BAR --- */
        nav {
            height: 64px; background: var(--sf-card); backdrop-filter: var(--sf-blur);
            border-bottom: 0.5px solid var(--sf-border);
            position: fixed; top: 0; width: 100%; z-index: 1000;
            display: flex; align-items: center; padding: 0 32px; justify-content: space-between;
        }
        .nav-logo { font-weight: 800; font-size: 20px; letter-spacing: -0.8px; }
        
        .search-container { position: relative; width: 280px; }
        .search-bar {
            width: 100%; padding: 10px 16px; border-radius: 12px;
            background: rgba(0, 0, 0, 0.05); border: none; font-size: 14px;
            transition: var(--anim);
        }
        .search-bar:focus { width: 340px; background: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.08); outline: none; }

        /* --- AUTH SCREEN --- */
        .auth-container {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            width: 420px; padding: 60px 40px; text-align: center;
            background: var(--sf-card); backdrop-filter: var(--sf-blur);
            border-radius: 42px; border: 1px solid var(--sf-border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            animation: cardScale 1s ease;
        }
        @keyframes cardScale { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .auth-card h1 { font-size: 48px; font-weight: 700; letter-spacing: -2px; margin-bottom: 4px; }
        .auth-card p { color: var(--sf-label); font-size: 19px; font-weight: 400; margin-bottom: 40px; }

        .field-apple {
            width: 100%; padding: 18px 20px; border-radius: 16px;
            background: #fff; border: 1px solid var(--sf-border);
            margin-bottom: 12px; font-size: 16px; font-family: inherit;
            transition: var(--anim);
        }
        .field-apple:focus { border-color: var(--sf-accent); box-shadow: 0 0 0 4px rgba(0,122,255,0.1); outline: none; }

        .btn-apple {
            width: 100%; padding: 18px; border-radius: 16px;
            background: var(--sf-text); color: #fff; border: none;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: var(--anim);
            margin-top: 10px;
        }
        .btn-apple:hover { transform: translateY(-2px); opacity: 0.9; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* --- PROFILE VIEW --- */
        #app-view { display: none; padding-top: 120px; max-width: 800px; margin: 0 auto; padding-inline: 24px; }

        .profile-hero {
            background: var(--sf-card); backdrop-filter: var(--sf-blur);
            border-radius: 38px; border: 1px solid var(--sf-border);
            padding: 48px; display: flex; align-items: center; gap: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.03); margin-bottom: 32px;
        }
        .avatar-frame {
            width: 160px; height: 160px; background: linear-gradient(135deg, #000, #333);
            border-radius: 40px; display: grid; place-items: center;
            font-size: 64px; font-weight: 700; color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); transform: rotate(-2deg);
        }

        .user-meta h2 { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
        .user-meta p { font-size: 18px; color: var(--sf-label); margin-top: 8px; }

        .ios-stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 32px;
        }
        .stat-capsule {
            background: #fff; padding: 24px; border-radius: 28px;
            border: 1px solid var(--sf-border); text-align: center; transition: var(--anim);
        }
        .stat-capsule:hover { transform: translateY(-4px); border-color: var(--sf-accent); }
        .stat-capsule b { font-size: 28px; font-weight: 800; display: block; color: var(--sf-accent); }
        .stat-capsule span { font-size: 11px; font-weight: 700; color: var(--sf-label); text-transform: uppercase; letter-spacing: 1px; }

        /* --- ADMIN LIST (Estilo "Apple Music") --- */
        #admin-panel { margin-top: 48px; }
        .admin-item {
            display: flex; align-items: center; gap: 16px; padding: 16px;
            background: var(--sf-card); border-bottom: 0.5px solid var(--sf-border);
            transition: var(--anim); cursor: pointer;
        }
        .admin-item:first-child { border-radius: 20px 20px 0 0; }
        .admin-item:last-child { border-radius: 0 0 20px 20px; border: none; }
        .admin-item:hover { background: #fff; transform: scale(1.02); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .mini-av { width: 44px; height: 44px; background: #000; border-radius: 12px; color: #fff; display: grid; place-items: center; font-weight: 700; }

        /* --- TOAST MODERNO --- */
        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 14px 28px;
            border-radius: 24px; font-size: 14px; font-weight: 600; 
            backdrop-filter: blur(10px); display: none; z-index: 5000;
        }
    </style>
</head>
<body>

    <div class="wallpaper"></div>

    <div id="status-pill">
        <div id="dot" class="dot offline"></div>
        <span id="status-txt">Offline</span>
    </div>

    <div id="toast"></div>

    <nav id="top-nav" style="display:none;">
        <div class="nav-logo" onclick="location.reload()">ECHACA</div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Buscar desarrolladores..." oninput="doSearch(this.value)">
        </div>
        <div style="display:flex; align-items:center; gap:16px;">
            <div onclick="goHome()" style="cursor:pointer; font-weight:600; font-size:14px; color:var(--sf-accent);">Mi Perfil</div>
        </div>
    </nav>

    <section id="auth-view" class="auth-container">
        <div class="auth-card">
            <h1>Studio</h1>
            <p id="auth-sub">Identity management for Echaca.</p>
            
            <div id="login-box">
                <input type="email" id="l-email" class="field-apple" placeholder="Echaca ID (Email)">
                <input type="password" id="l-pass" class="field-apple" placeholder="Contraseña">
                <button onclick="auth('login')" class="btn-apple">Sign In</button>
                <div style="margin-top:32px; font-size:14px;">
                    ¿No tienes un Echaca ID? <span onclick="toggle(true)" style="color:var(--sf-accent); cursor:pointer; font-weight:600;">Regístrate ahora.</span>
                </div>
            </div>

            <div id="reg-box" style="display:none;">
                <input type="text" id="r-name" class="field-apple" placeholder="Nombre completo">
                <input type="email" id="r-email" class="field-apple" placeholder="Email">
                <input type="password" id="r-pass" class="field-apple" placeholder="Contraseña">
                <button onclick="auth('register')" class="btn-apple" style="background:var(--sf-accent);">Crear Cuenta</button>
                <div style="margin-top:32px; font-size:14px;">
                    ¿Ya tienes cuenta? <span onclick="toggle(false)" style="color:var(--sf-accent); cursor:pointer; font-weight:600;">Iniciar sesión.</span>
                </div>
            </div>
        </div>
    </section>

    <main id="app-view">
        <div class="profile-hero">
            <div id="p-avatar" class="avatar-frame">?</div>
            <div class="user-meta">
                <h2 id="p-name">Emmanuel</h2>
                <p id="p-email">admin@echaca.studio</p>
                <div id="p-actions" style="margin-top:24px;"></div>
            </div>
        </div>

        <div class="ios-stats">
            <div class="stat-capsule"><b id="s-foll">0</b><span>Followers</span></div>
            <div class="stat-capsule"><b id="s-following">0</b><span>Following</span></div>
        </div>

        <button id="btn-admin" onclick="loadAdmin()" style="display:none; width:100%; padding:20px; border-radius:24px; background:var(--sf-card); border:1px solid var(--sf-border); font-weight:700; color:var(--sf-text); cursor:pointer; margin-top:32px; backdrop-filter: var(--sf-blur);">
            Auditoría de Red Maestra
        </button>

        <section id="admin-panel">
            </section>

        <footer style="margin-top:100px; padding:40px; text-align:center; color:var(--sf-label); font-size:12px; font-weight:600; letter-spacing:1px;">
            ECHACA DESIGN LABS © 2026
        </footer>
    </main>

    <script>
        let ME = null;

        // --- SISTEMA DE ESTADO ---
        async function checkServer() {
            const dot = document.getElementById('dot');
            const txt = document.getElementById('status-txt');
            try {
                const r = await fetch('/api/admin/database');
                if(r.ok) {
                    dot.className = 'dot online';
                    txt.innerText = 'Connected';
                } else { throw 'err'; }
            } catch(e) {
                dot.className = 'dot offline';
                txt.innerText = 'Server Offline';
            }
        }
        setInterval(checkServer, 5000); checkServer();

        function notify(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function toggle(r) {
            document.getElementById('login-box').style.display = r ? 'none' : 'block';
            document.getElementById('reg-box').style.display = r ? 'block' : 'none';
        }

        // --- AUTENTICACIÓN ---
        async function auth(mode) {
            const email = document.getElementById(mode === 'login' ? 'l-email' : 'r-email').value;
            const pass = document.getElementById(mode === 'login' ? 'l-pass' : 'r-pass').value;
            const name = mode === 'register' ? document.getElementById('r-name').value : '';

            // Acceso Maestro para Emmanuel
            if(email === "emma2013rq@gmail.com") {
                ME = { id: 1, nombre: "Emmanuel", email, isAdmin: true, stats: {followers:[], following:[]} };
                start(); return;
            }

            try {
                const res = await fetch(`/auth/${mode}`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ nombre: name, email, password: pass })
                });
                if(res.ok) {
                    if(mode === 'login') { ME = await res.json(); start(); }
                    else { notify("Registro completo."); toggle(false); }
                } else { notify("Credenciales inválidas."); }
            } catch(e) { notify("Error de red."); }
        }

        function start() {
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('top-nav').style.display = 'flex';
            document.getElementById('app-view').style.display = 'block';
            if(ME.isAdmin) document.getElementById('btn-admin').style.display = 'block';
            render(ME);
        }

        function render(u) {
            document.getElementById('p-name').innerText = u.nombre;
            document.getElementById('p-email').innerText = u.email;
            document.getElementById('p-avatar').innerText = u.nombre[0].toUpperCase();
            document.getElementById('s-foll').innerText = u.fCount || 0;
            document.getElementById('s-following').innerText = u.id === ME.id ? ME.stats.following.length : 0;
            
            const area = document.getElementById('p-actions');
            area.innerHTML = '';
            if(u.id !== ME.id) {
                const isF = ME.stats.following.includes(u.id);
                const b = document.createElement('button');
                b.className = 'btn-apple';
                b.innerText = isF ? 'Siguiendo' : 'Seguir';
                b.style.width = 'auto'; b.style.padding = '12px 30px';
                b.style.background = isF ? 'var(--sf-card)' : 'var(--sf-text)';
                b.style.color = isF ? 'var(--sf-text)' : '#fff';
                b.style.border = isF ? '1px solid var(--sf-border)' : 'none';
                b.onclick = () => follow(u, b);
                area.appendChild(b);
            }
        }

        async function loadAdmin() {
            const panel = document.getElementById('admin-panel');
            if(panel.innerHTML !== "") { panel.innerHTML = ""; return; }
            try {
                const res = await fetch('/api/admin/database');
                const data = await res.json();
                data.forEach(u => {
                    panel.innerHTML += `
                        <div class="admin-item" onclick="renderOther(${JSON.stringify(u).replace(/"/g, '&quot;')})">
                            <div class="mini-av">${u.nombre[0].toUpperCase()}</div>
                            <div style="flex:1">
                                <div style="font-weight:700; font-size:16px;">${u.nombre}</div>
                                <div style="font-size:13px; color:var(--sf-label);">${u.email}</div>
                            </div>
                            <div style="font-size:10px; font-weight:800; color:var(--sf-accent);">USER_ID_${u.id}</div>
                        </div>
                    `;
                });
            } catch(e) { notify("No se pudo cargar la base de datos."); }
        }

        function renderOther(u) { render(u); window.scrollTo({top:0, behavior:'smooth'}); }
        function goHome() { render(ME); }
    </script>
</body>
</html>
