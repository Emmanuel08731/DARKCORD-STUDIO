<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workstation Pro | Apple Elite Design</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-red: #FF3B30;
            --apple-gray-bg: #F5F5F7;
            --apple-dark-text: #1D1D1F;
            --glass-white: rgba(255, 255, 255, 0.85);
            --border-standard: rgba(0, 0, 0, 0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Icons", "Helvetica Neue", sans-serif; -webkit-font-smoothing: antialiased; }

        body { 
            background-color: var(--apple-gray-bg);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        .hidden { display: none !important; }

        /* Contenedor Principal (Apple Canvas Pro) */
        .apple-canvas {
            background: var(--glass-white);
            backdrop-filter: blur(50px) saturate(210%);
            width: 95%; max-width: 1000px;
            min-height: 700px;
            border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 40px 100px rgba(0,0,0,0.06), 0 10px 20px rgba(0,0,0,0.02);
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
        }

        /* Barra Superior Estilo Mac */
        .canvas-header {
            padding: 20px 35px; border-bottom: 1px solid var(--border-standard);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.4);
        }
        .window-controls { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; transition: 0.2s; }
        .red { background: #FF5F57; } .yellow { background: #FFBD2E; } .green { background: #28C840; }
        .window-controls:hover .dot { transform: scale(1.1); }

        /* Vistas de Contenido */
        .view-frame { flex-grow: 1; padding: 50px; overflow-y: auto; text-align: center; position: relative; }

        /* Tipografía Refinada */
        h1 { font-size: 42px; font-weight: 700; letter-spacing: -1.8px; color: var(--apple-dark-text); margin-bottom: 8px; }
        p.desc { color: #86868b; font-size: 18px; margin-bottom: 45px; font-weight: 400; }

        /* Inputs Estilo iOS/macOS Moderno */
        .input-group { margin-bottom: 25px; text-align: left; max-width: 420px; margin-left: auto; margin-right: auto; }
        label { font-size: 13px; font-weight: 600; color: var(--apple-blue); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 15px; display: block; margin-bottom: 6px; }
        
        .pass-container { position: relative; }
        input {
            width: 100%; padding: 18px 22px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.6); font-size: 17px; outline: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus { border-color: var(--apple-blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.12); }

        .toggle-password {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #8E8E93; font-size: 18px; transition: 0.2s;
        }
        .toggle-password:hover { color: var(--apple-blue); }

        /* Botones Elite */
        .btn {
            padding: 18px 30px; border-radius: 18px; border: none; font-size: 17px;
            font-weight: 600; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { 
            background: linear-gradient(180deg, #007AFF 0%, #006EDF 100%);
            color: white; width: 100%; max-width: 420px;
            box-shadow: 0 10px 20px rgba(0,122,255,0.2);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,122,255,0.3); }
        .btn-primary:active { transform: scale(0.98); }
        
        .btn-ghost { background: none; color: var(--apple-blue); margin-top: 15px; font-size: 15px; }

        /* Cronómetro con Neon Suave */
        .chrono-display {
            font-size: 120px; font-weight: 800; letter-spacing: -6px; margin: 50px 0;
            color: var(--apple-dark-text); font-variant-numeric: tabular-nums;
            text-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        /* Listas y Filas de Datos (Apple Card Style) */
        .row-card {
            background: rgba(255,255,255,0.5); padding: 25px 35px; border-radius: 25px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(0,0,0,0.02); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .row-card:hover { 
            background: white; 
            transform: translateY(-5px) scale(1.01); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border-color: rgba(0,113,227,0.1);
        }

        /* Sub-pestañas Deslizantes (Internal SPA) */
        .internal-page {
            position: absolute; inset: 0; background: #F2F2F7; padding: 50px; z-index: 100;
            display: flex; flex-direction: column; text-align: left;
        }

        /* Scrollbar Apple */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>

<div class="apple-canvas animate__animated animate__fadeInUp">
    <div class="canvas-header">
        <div class="window-controls">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div id="status-display" style="font-weight: 700; font-size: 12px; color: #8E8E93; text-transform: uppercase; letter-spacing: 1px;">Station Idle</div>
    </div>

    <div id="view-auth" class="view-frame animate__animated animate__fadeIn">
        <h1 id="auth-title" class="animate__animated animate__fadeInDown animate__delay-1s">Bienvenido</h1>
        <p class="desc animate__animated animate__fadeIn animate__delay-1s">Control de Jornada Laboral | Workstation Pro</p>
        
        <div id="reg-fields" class="hidden animate__animated animate__fadeIn">
            <div class="input-group"><label>Nombre</label><input type="text" id="a-name"></div>
        </div>
        <div class="input-group animate__animated animate__fadeInUp animate__delay-1s"><label>Email</label><input type="email" id="a-email"></div>
        
        <div class="input-group animate__animated animate__fadeInUp animate__delay-2s">
            <label>Contraseña</label>
            <div class="pass-container">
                <input type="password" id="a-pass">
                <i class="fa fa-eye toggle-password" onclick="togglePass('a-pass', this)"></i>
            </div>
        </div>
        
        <button class="btn btn-primary animate__animated animate__fadeInUp animate__delay-2s" onclick="processAuth()">Continuar <i class="fa fa-chevron-right"></i></button><br>
        <button class="btn btn-ghost" onclick="toggleMode()" id="t-btn">¿No tienes cuenta? Regístrate</button>
    </div>

    <div id="view-dash" class="view-frame hidden animate__animated animate__fadeIn">
        <h1 id="welcome-msg" class="animate__animated animate__fadeInDown">Hola</h1>
        <p class="desc">Registra tu actividad actual</p>

        <div id="timer-setup" class="animate__animated animate__fadeIn">
            <div class="input-group" style="margin-top: 30px;">
                <label>Proyecto / Tarea Actual</label>
                <input type="text" id="project-name" placeholder="Ej: Voy a hacer una iglesia">
            </div>
            <button class="btn btn-primary" onclick="startCounter()"><i class="fa fa-play"></i> Iniciar Jornada</button>
            <div style="margin-top: 25px; display: flex; justify-content: center; gap: 15px; max-width: 420px; margin-left: auto; margin-right: auto;">
                <button class="btn" style="background:rgba(0,0,0,0.05); color:var(--apple-blue); flex:1;" onclick="openMine()"><i class="fa fa-list-check"></i> Mis Tareas</button>
                <button id="adm-btn" class="btn hidden animate__animated animate__pulse animate__infinite" style="background:#1d1d1f; color:#fff; flex:1;" onclick="openAdmin()"><i class="fa fa-shield"></i> Panel Admin</button>
            </div>
            <button class="btn btn-ghost" style="color:var(--apple-red); margin-top: 40px; font-weight:700;" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div id="timer-running" class="hidden animate__animated animate__zoomIn">
            <div class="chrono-display" id="clock">00:00:00</div>
            <button class="btn btn-primary" style="background:var(--apple-red); box-shadow: 0 10px 20px rgba(255,59,48,0.3);" onclick="stopCounter()">
                <i class="fa fa-stop"></i> Finalizar Registro
            </button>
        </div>
    </div>

    <div id="sub-mine" class="internal-page hidden animate__animated animate__slideInRight">
        <button onclick="closeSub('sub-mine')" class="btn" style="background:#fff; color:var(--apple-blue); width:auto; padding:10px 20px; margin-bottom:30px;"><i class="fa fa-chevron-left"></i> Volver</button>
        <h1>Mis Registros</h1>
        <p class="desc">Historial completo de tu productividad.</p>
        <div id="mine-list" style="overflow-y:auto; flex-grow:1;"></div>
    </div>

    <div id="sub-admin" class="internal-page hidden animate__animated animate__slideInRight">
        <button onclick="closeSub('sub-admin')" class="btn" style="background:#fff; color:var(--apple-blue); width:auto; padding:10px 20px; margin-bottom:30px;"><i class="fa fa-chevron-left"></i> Salir de Admin</button>
        <h1>Auditoría Global</h1>
        <p class="desc">Gestión avanzada de usuarios y credenciales (0613).</p>
        <div id="admin-list" style="overflow-y:auto; flex-grow:1;"></div>
    </div>

    <div id="sub-user-detail" class="internal-page hidden animate__animated animate__slideInRight">
        <button onclick="closeSub('sub-user-detail')" class="btn" style="background:#fff; color:var(--apple-blue); width:auto; padding:10px 20px; margin-bottom:30px;"><i class="fa fa-chevron-left"></i> Volver a Usuarios</button>
        <h1 id="user-detail-title">Actividad</h1>
        <div id="user-detail-list" style="overflow-y:auto; flex-grow:1;"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    const CODE = '0613';
    let user = null;
    let isReg = false;
    let timer = null;
    let startTime = null;

    // Función para VER CONTRASEÑA con el Ojo
    function togglePass(id, icon) {
        const x = document.getElementById(id);
        if (x.type === "password") { x.type = "text"; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
        else { x.type = "password"; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
    }

    function toggleMode() {
        isReg = !isReg;
        document.getElementById('reg-fields').classList.toggle('hidden');
        document.getElementById('auth-title').innerText = isReg ? 'Registro Elite' : 'Bienvenido';
        document.getElementById('t-btn').innerText = isReg ? 'Ya tengo cuenta' : '¿No tienes cuenta? Regístrate';
    }

    async function processAuth() {
        const email = document.getElementById('a-email').value;
        const password = document.getElementById('a-pass').value;
        const nombre = document.getElementById('a-name').value;
        const res = await fetch(isReg ? '/api/auth/register' : '/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre, email, password })
        });
        const data = await res.json();
        if (res.ok) {
            if (isReg) { Swal.fire('Éxito', 'Registrado correctamente', 'success'); toggleMode(); }
            else { user = data; localStorage.setItem('sesion_ap', JSON.stringify(data)); goDash(); }
        } else { Swal.fire('Error', data.error, 'error'); }
    }

    function goDash() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-dash').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "Hola, " + user.nombre;
        document.getElementById('status-display').innerText = "Sesión Activa: " + user.nombre.toUpperCase();
        if (user.email === MASTER) document.getElementById('adm-btn').classList.remove('hidden');
        
        checkTimer();
    }

    // --- LÓGICA DE TIEMPO INFINITO ---
    function checkTimer() {
        const sTime = localStorage.getItem('s_start');
        const sName = localStorage.getItem('s_name');
        if (sTime && sName) {
            document.getElementById('project-name').value = sName;
            runClock(parseInt(sTime));
        }
    }

    function startCounter() {
        const name = document.getElementById('project-name').value;
        if (!name) return Swal.fire('Nota', 'Escribe el proyecto', 'info');
        startTime = new Date().getTime();
        localStorage.setItem('s_start', startTime);
        localStorage.setItem('s_name', name);
        runClock(startTime);
    }

    function runClock(start) {
        document.getElementById('timer-setup').classList.add('hidden');
        document.getElementById('timer-running').classList.remove('hidden');
        if (timer) clearInterval(timer);
        timer = setInterval(() => {
            const diff = new Date().getTime() - start;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    async function stopCounter() {
        clearInterval(timer);
        const duracion = document.getElementById('clock').innerText;
        const proyecto = localStorage.getItem('s_name');
        await fetch('/api/tiempo/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario_id: user.id, proyecto, duracion })
        });
        localStorage.removeItem('s_start'); localStorage.removeItem('s_name');
        location.reload();
    }

    // --- NAVEGACIÓN SPA ---
    async function openMine() {
        document.getElementById('sub-mine').classList.remove('hidden');
        const r = await fetch(`/api/tareas/mias?uid=${user.id}`);
        const data = await r.json();
        document.getElementById('mine-list').innerHTML = data.map(t => `
            <div class="row-card animate__animated animate__fadeInUp">
                <div><b style="font-size:18px;">${t.proyecto}</b><br><small style="color:#8E8E93;">${t.fecha}</small></div>
                <div style="font-size:24px; font-weight:800; color:var(--apple-blue);">${t.duracion}</div>
            </div>
        `).join('') || '<p>No hay registros aún.</p>';
    }

    async function openAdmin() {
        document.getElementById('sub-admin').classList.remove('hidden');
        const r = await fetch(`/api/admin/usuarios?admin_email=${user.email}`);
        const list = await r.json();
        document.getElementById('admin-user-list').innerHTML = list.map(u => `
            <div class="row-card animate__animated animate__fadeInUp">
                <div onclick="viewUser(${u.id}, '${u.nombre}')" style="cursor:pointer; flex-grow:1;">
                    <b style="font-size:18px;">${u.nombre}</b><br><small style="color:var(--apple-blue);">Ver historial <i class="fa fa-chevron-right"></i></small>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="background:#fff; border:1px solid #ddd; padding:10px; width:auto; color:var(--apple-dark-text);" onclick="showCreds('${u.email}', '${u.password}')"><i class="fa fa-key"></i> Credenciales</button>
                    <button class="btn" style="background:#fff; border:1px solid #ddd; padding:10px; width:auto; color:var(--apple-red);" onclick="delUser(${u.id})"><i class="fa fa-trash"></i></button>
                </div>
            </div>
        `).join('');
    }

    async function viewUser(id, name) {
        document.getElementById('sub-user-detail').classList.remove('hidden');
        document.getElementById('user-detail-title').innerText = "Tareas de " + name;
        const r = await fetch(`/api/admin/tareas-usuario/${id}?admin_email=${user.email}`);
        const data = await r.json();
        document.getElementById('user-detail-list').innerHTML = data.map(t => `
            <div class="row-card animate__animated animate__fadeInUp">
                <div><b>${t.proyecto}</b><br><small>${t.fecha}</small></div>
                <div style="font-weight:800; color:var(--apple-blue);">${t.duracion}</div>
            </div>
        `).join('') || '<p>Este usuario no tiene registros.</p>';
    }

    async function showCreds(email, pass) {
        const { value: code } = await Swal.fire({ title: 'Código Admin', input: 'password', showCancelButton: true, confirmButtonColor: '#007AFF' });
        if (code === CODE) {
            Swal.fire({ title: 'Credenciales', html: `<div style="text-align:left;"><b>Email:</b> ${email}<br><b>Password:</b> ${pass}</div>`, icon: 'success' });
        } else if (code) { Swal.fire('Error', 'Código incorrecto', 'error'); }
    }

    async function delUser(id) {
        const { isConfirmed } = await Swal.fire({ title: '¿Borrar?', showCancelButton: true, confirmButtonColor: '#FF3B30' });
        if (isConfirmed) { await fetch(`/api/admin/usuarios/${id}?admin_email=${user.email}`, {method: 'DELETE'}); openAdmin(); }
    }

    function closeSub(id) { document.getElementById(id).classList.add('hidden'); }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const saved = localStorage.getItem('sesion_ap');
        if (saved) { user = JSON.parse(saved); goDash(); }
    };
</script>
</body>
</html>
