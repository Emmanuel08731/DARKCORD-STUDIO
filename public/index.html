<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workstation Pro | Apple Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        :root {
            --blue: #007AFF;
            --gray-bg: #F2F2F7;
            --dark-text: #1C1C1E;
            --glass: rgba(255, 255, 255, 0.75);
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }

        body { 
            background-color: #E5E5EA;
            background-image: radial-gradient(circle at 10% 20%, rgba(0,122,255,0.05) 0%, transparent 50%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .hidden { display: none !important; }

        .apple-canvas {
            background: var(--glass);
            backdrop-filter: blur(60px) saturate(210%);
            width: 92%; max-width: 950px;
            min-height: 650px;
            border-radius: 35px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 40px 100px rgba(0,0,0,0.08);
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
        }

        .canvas-header {
            padding: 25px 35px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .view-content { flex-grow: 1; padding: 50px; overflow-y: auto; text-align: center; }

        h1 { font-size: 38px; font-weight: 700; letter-spacing: -1.5px; margin-bottom: 10px; }
        p.desc { color: #8E8E93; font-size: 17px; margin-bottom: 40px; }

        /* Estilo para el Input con Ojo */
        .input-group { margin-bottom: 25px; text-align: left; max-width: 450px; margin-left: auto; margin-right: auto; position: relative; }
        label { font-size: 13px; font-weight: 600; margin-left: 15px; display: block; margin-bottom: 6px; }
        
        .pass-wrapper { position: relative; }
        input {
            width: 100%; padding: 18px 22px; border-radius: 16px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.6); font-size: 17px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--blue); background: #fff; }

        .toggle-pass {
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #8E8E93; font-size: 18px; transition: 0.2s;
        }
        .toggle-pass:hover { color: var(--blue); }

        .btn {
            padding: 18px 30px; border-radius: 18px; border: none; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: var(--blue); color: white; width: 100%; max-width: 450px; }
        .btn-ghost { background: none; color: var(--blue); margin-top: 15px; }

        .chrono-display { font-size: 120px; font-weight: 800; letter-spacing: -6px; margin: 50px 0; font-variant-numeric: tabular-nums; }

        .row-item {
            background: rgba(255,255,255,0.5); padding: 22px 30px; border-radius: 22px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }

        .sub-view {
            position: absolute; inset: 0; background: #F2F2F7; padding: 50px; z-index: 100;
            display: flex; flex-direction: column; text-align: left;
        }
    </style>
</head>
<body>

<div class="apple-canvas animate__animated animate__fadeInUp">
    <div class="canvas-header">
        <div style="display:flex; gap:8px;">
            <div style="width:12px; height:12px; border-radius:50%; background:#FF5F57;"></div>
            <div style="width:12px; height:12px; border-radius:50%; background:#FFBD2E;"></div>
            <div style="width:12px; height:12px; border-radius:50%; background:#28C840;"></div>
        </div>
        <div id="session-info" style="font-weight: 600; font-size: 13px; color: #8E8E93;">IDLE</div>
    </div>

    <div id="view-auth" class="view-content">
        <h1 id="auth-title">Bienvenido</h1>
        <p class="desc">Sistema de Gestión de Jornada</p>
        
        <div id="reg-fields" class="hidden">
            <div class="input-group"><label>Nombre</label><input type="text" id="i-name"></div>
        </div>
        <div class="input-group"><label>Email</label><input type="email" id="i-email"></div>
        
        <div class="input-group">
            <label>Contraseña</label>
            <div class="pass-wrapper">
                <input type="password" id="i-pass">
                <i class="fa fa-eye toggle-pass" onclick="togglePassView('i-pass', this)"></i>
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="processAuth()">Continuar</button><br>
        <button class="btn btn-ghost" onclick="toggleMode()" id="mode-btn">¿No tienes cuenta? Regístrate</button>
    </div>

    <div id="view-dash" class="view-content hidden">
        <h1 id="welcome-msg">Hola</h1>
        <p class="desc">Panel de Control</p>

        <div id="setup-section">
            <div class="input-group">
                <label>Proyecto Actual</label>
                <input type="text" id="task-name" placeholder="Ej: Desarrollo Web">
            </div>
            <button class="btn btn-primary" onclick="startCounter()"><i class="fa fa-play"></i> Iniciar Tarea</button>
            <div style="margin-top: 20px; display: flex; justify-content: center; gap: 15px; max-width: 450px; margin-left: auto; margin-right: auto;">
                <button class="btn" style="background:#E5E5EA; flex:1;" onclick="openMyTasks()"><i class="fa fa-list"></i> Mis Tareas</button>
                <button id="admin-lock" class="btn hidden" style="background:#1c1c1e; color:#fff; flex:1;" onclick="openAdmin()"><i class="fa fa-shield"></i> Admin</button>
            </div>
            <button class="btn btn-ghost" style="color:#FF3B30; margin-top: 30px;" onclick="logOut()">Cerrar Sesión</button>
        </div>

        <div id="active-section" class="hidden">
            <div class="chrono-display" id="display">00:00:00</div>
            <button class="btn btn-primary" style="background:#FF3B30;" onclick="stopCounter()">Finalizar Registro</button>
        </div>
    </div>

    <div id="sub-tasks" class="sub-view hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1>Mis Tareas</h1>
            <button onclick="closeSub('sub-tasks')" class="btn" style="background:#fff; width:auto; padding:10px 25px;">Cerrar</button>
        </div>
        <div id="mytasks-list"></div>
    </div>

    <div id="sub-admin" class="sub-view hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1>Usuarios del Sistema</h1>
            <button onclick="closeSub('sub-admin')" class="btn" style="background:#fff; width:auto; padding:10px 25px;">Cerrar</button>
        </div>
        <p style="color:#8E8E93; margin-bottom:20px;">Gestión de accesos y eliminación de cuentas.</p>
        <div id="admin-list"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    let currentUser = null;
    let isReg = false;
    let mainTimer = null;

    // Función para VER CONTRASEÑA
    function togglePassView(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function toggleMode() {
        isReg = !isReg;
        document.getElementById('reg-fields').classList.toggle('hidden');
        document.getElementById('auth-title').innerText = isReg ? 'Crear Cuenta' : 'Bienvenido';
        document.getElementById('mode-btn').innerText = isReg ? 'Ya tengo cuenta' : '¿No tienes cuenta? Regístrate';
    }

    async function processAuth() {
        const email = document.getElementById('i-email').value;
        const password = document.getElementById('i-pass').value;
        const nombre = document.getElementById('i-name').value;
        const url = isReg ? '/api/auth/register' : '/api/auth/login';

        const r = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre, email, password })
        });
        const d = await r.json();
        if (r.ok) {
            if (isReg) { Swal.fire('Éxito', 'Cuenta creada', 'success'); toggleMode(); }
            else { currentUser = d; localStorage.setItem('apple_session', JSON.stringify(d)); loadDashboard(); }
        } else { Swal.fire('Error', d.error, 'error'); }
    }

    function loadDashboard() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-dash').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "Hola, " + currentUser.nombre;
        if (currentUser.email === MASTER) document.getElementById('admin-lock').classList.remove('hidden');
        checkActiveTimer();
    }

    function checkActiveTimer() {
        const savedStart = localStorage.getItem('task_start_time');
        const savedName = localStorage.getItem('task_active_name');
        if (savedStart && savedName) {
            document.getElementById('task-name').value = savedName;
            runVisualTimer(parseInt(savedStart));
        }
    }

    function startCounter() {
        const name = document.getElementById('task-name').value;
        if (!name) return Swal.fire('Aviso', 'Escribe el nombre del proyecto', 'info');
        const startTime = new Date().getTime();
        localStorage.setItem('task_start_time', startTime);
        localStorage.setItem('task_active_name', name);
        runVisualTimer(startTime);
    }

    function runVisualTimer(startTime) {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('active-section').classList.remove('hidden');
        if (mainTimer) clearInterval(mainTimer);
        mainTimer = setInterval(() => {
            const diff = new Date().getTime() - startTime;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('display').innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    async function stopCounter() {
        clearInterval(mainTimer);
        const duracion = document.getElementById('display').innerText;
        const proyecto = localStorage.getItem('task_active_name');
        await fetch('/api/tiempo/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario_id: currentUser.id, proyecto, duracion })
        });
        localStorage.removeItem('task_start_time');
        localStorage.removeItem('task_active_name');
        Swal.fire('Guardado', 'Registro almacenado', 'success').then(() => location.reload());
    }

    async function openMyTasks() {
        document.getElementById('sub-tasks').classList.remove('hidden');
        const r = await fetch(`/api/tareas/mias?uid=${currentUser.id}`);
        const data = await r.json();
        document.getElementById('mytasks-list').innerHTML = data.map(t => `
            <div class="row-item">
                <div><b>${t.proyecto}</b><br><small>${t.fecha}</small></div>
                <div style="font-size:20px; font-weight:700; color:var(--blue)">${t.duracion}</div>
            </div>
        `).join('') || '<p>Sin registros.</p>';
    }

    async function openAdmin() {
        document.getElementById('sub-admin').classList.remove('hidden');
        const r = await fetch(`/api/admin/usuarios?admin_email=${currentUser.email}`);
        const list = await r.json();
        document.getElementById('admin-list').innerHTML = list.map(u => `
            <div class="row-item">
                <div><b>${u.nombre}</b><br><small>${u.email}</small></div>
                <button onclick="deleteUser(${u.id})" class="btn" style="background:none; color:#FF3B30; width:auto;"><i class="fa fa-trash"></i> Borrar Cuenta</button>
            </div>
        `).join('');
    }

    async function deleteUser(id) {
        const { isConfirmed } = await Swal.fire({ title: '¿Eliminar usuario?', text: "Esta acción no se puede deshacer.", showCancelButton: true, confirmButtonColor: '#FF3B30' });
        if (isConfirmed) {
            await fetch(`/api/admin/usuarios/${id}?admin_email=${currentUser.email}`, { method: 'DELETE' });
            openAdmin();
        }
    }

    function closeSub(id) { document.getElementById(id).classList.add('hidden'); }
    function logOut() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const saved = localStorage.getItem('apple_session');
        if (saved) { currentUser = JSON.parse(saved); loadDashboard(); }
    };
</script>
</body>
</html>
