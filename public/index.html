<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Styles | Premium Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* APPLE DESIGN LANGUAGE v3.0 */
        :root {
            --apple-blue: #0071e3;
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.7);
            --apple-text: #1d1d1f;
            --apple-gray: #86868b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; }

        body { 
            background: var(--apple-bg); color: var(--apple-text); 
            min-height: 100vh; overflow-x: hidden;
            background-image: radial-gradient(at 0% 0%, rgba(0,113,227,0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(0,113,227,0.05) 0px, transparent 50%);
        }

        .hidden { display: none !important; }

        /* NAVEGACIÓN ESTILO GLASSMORPISM */
        nav {
            position: fixed; top: 0; width: 100%; height: 52px;
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.75); border-bottom: 1px solid rgba(0,0,0,0.08);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; z-index: 2000;
        }

        .logo { font-weight: 700; font-size: 19px; letter-spacing: -0.5px; }

        /* CONTENEDORES MAESTROS */
        .container { 
            max-width: 460px; margin: 120px auto; padding: 20px; 
            perspective: 1000px;
        }

        .apple-card {
            background: var(--apple-card); border-radius: 32px; padding: 45px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            text-align: center; transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .apple-card:hover { transform: translateY(-5px); box-shadow: 0 30px 60px rgba(0,0,0,0.06); }

        h1 { font-size: 44px; font-weight: 700; letter-spacing: -2px; margin-bottom: 10px; }
        .subtitle { color: var(--apple-gray); font-size: 17px; margin-bottom: 35px; }

        /* INPUTS TIPO IOS 18 */
        .field { text-align: left; margin-bottom: 20px; }
        .field label { font-size: 12px; font-weight: 700; color: var(--apple-gray); margin-left: 15px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 18px; margin-top: 6px; border-radius: 16px;
            border: 1px solid #d2d2d7; background: #fff; font-size: 17px;
            transition: 0.3s; outline: none;
        }
        input:focus { border-color: var(--apple-blue); box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12); }

        /* BOTONES PREMIUM */
        .btn-primary {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            background: var(--apple-blue); color: white; font-size: 17px; font-weight: 600;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }

        .btn-admin {
            background: #1d1d1f; color: white; margin-top: 25px; padding: 12px;
            border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer;
            border: none; display: inline-block; width: 100%;
            animation: pulse 2s infinite;
        }

        /* TIMER & STATUS */
        .timer-display {
            background: #000; color: #fff; border-radius: 28px;
            padding: 50px 20px; margin: 30px 0; position: relative; overflow: hidden;
        }
        .timer-display::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--apple-blue), transparent);
            animation: rotate 4s linear infinite; opacity: 0.2;
        }
        .clock { font-size: 78px; font-weight: 700; letter-spacing: -4px; position: relative; font-variant-numeric: tabular-nums; }

        /* HISTORIAL */
        .history-item {
            background: #fff; border-radius: 18px; padding: 18px;
            margin-top: 12px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid rgba(0,0,0,0.03);
            text-align: left; animation: fadeInUp 0.5s ease;
        }

        .user-row {
            background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,0,0,0.05);
        }
        .user-row:hover { background: #fbfbfd; transform: scale(1.02); }

        /* MODALES PANTALLA COMPLETA */
        .full-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--apple-bg); z-index: 3000; overflow-y: auto;
            padding: 60px 20px; animation: slideInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,0,0,0.2); } 70% { box-shadow: 0 0 0 10px rgba(0,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); } }
    </style>
</head>
<body>

<nav id="top-nav" class="hidden">
    <div class="logo">Diesel Styles</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span id="nav-user" style="font-weight: 600; font-size: 13px; color: var(--apple-gray);"></span>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--apple-blue); font-weight:700; cursor:pointer;">Salir</button>
    </div>
</nav>

<div class="container">
    
    <div id="auth-card" class="apple-card animate__animated animate__fadeIn">
        <h1>Hola</h1>
        <p class="subtitle">Gestiona tu tiempo en la red Diesel.</p>

        <div id="reg-name-group" class="hidden field">
            <label>Nombre Completo</label>
            <input type="text" id="in-name" placeholder="Ej: Emmanuel Rodriguez">
        </div>

        <div class="field">
            <label>Correo Electrónico</label>
            <input type="email" id="in-email" placeholder="nombre@gmail.com">
        </div>

        <div class="field">
            <label>Contraseña</label>
            <input type="password" id="in-pass" placeholder="••••••••">
        </div>

        <button class="btn-primary" onclick="authAction()">Continuar</button>
        <button onclick="toggleReg()" id="btn-switch" style="background:none; border:none; color:var(--apple-blue); margin-top:25px; cursor:pointer; font-weight:500;">¿Eres nuevo? Crea una cuenta</button>
    </div>

    <div id="work-card" class="apple-card hidden animate__animated animate__fadeInUp">
        <div style="text-align: left; margin-bottom: 20px;">
            <h2 id="user-welcome" style="font-size: 32px;">Hola</h2>
            <p id="status-msg" style="color:var(--apple-gray);">Listo para empezar la jornada.</p>
        </div>

        <div id="setup-panel">
            <div class="field">
                <label>¿Qué vas a hacer?</label>
                <input type="text" id="task-name" placeholder="Ej: Diseño de Cuentas">
            </div>
            <button class="btn-primary" onclick="startWork()">Iniciar Cronómetro</button>
            
            <button id="admin-panel-btn" class="btn-admin hidden" onclick="openAdmin()">Ver Cuentas Registradas →</button>
        </div>

        <div id="timer-panel" class="hidden">
            <div class="timer-display">
                <div id="active-task" style="font-size: 11px; text-transform: uppercase; font-weight: 800; color: var(--apple-blue); margin-bottom: 10px;">PRODUCCIÓN ACTIVA</div>
                <div class="clock" id="clock">00:00:00</div>
            </div>
            <button class="btn-primary" style="background:#000;" onclick="stopWork()">Finalizar y Guardar</button>
        </div>

        <div style="text-align: left; margin-top: 40px;">
            <h3 style="font-size: 20px; font-weight: 700;">Historial de Hoy</h3>
            <div id="today-list"></div>
        </div>
    </div>
</div>

<div id="admin-modal" class="full-modal hidden">
    <div style="max-width: 500px; margin: 0 auto;">
        <button onclick="closeAdmin()" style="background:none; border:none; color:var(--apple-blue); font-weight:700; cursor:pointer; font-size:18px;">← Volver al Panel</button>
        <h1 style="margin-top:30px;">Cuentas</h1>
        <p class="subtitle">Base de datos de todos los registrados.</p>
        <div id="user-list-content"></div>
    </div>
</div>

<div id="detail-modal" class="full-modal hidden">
    <div style="max-width: 500px; margin: 0 auto;">
        <button onclick="closeDetail()" style="background:none; border:none; color:var(--apple-blue); font-weight:700; cursor:pointer; font-size:18px;">← Volver a Cuentas</button>
        <h1 id="det-user-name" style="margin-top:30px;">Usuario</h1>
        <p id="det-user-mail" class="subtitle"></p>
        <div id="det-history-content"></div>
    </div>
</div>

<script>
    const SUPER_ADMIN = 'emmanuel2013rq@gmail.com';
    let user = null; let isReg = false; let timerInt = null; let startT = null;

    function toggleReg() {
        isReg = !isReg;
        document.getElementById('reg-name-group').classList.toggle('hidden');
        document.getElementById('btn-switch').innerText = isReg ? "Ya tengo cuenta, entrar" : "¿Eres nuevo? Crea una cuenta";
    }

    async function authAction() {
        const email = document.getElementById('in-email').value.toLowerCase().trim();
        const password = document.getElementById('in-pass').value;
        const nombre = document.getElementById('in-name').value;
        const path = isReg ? '/api/auth/register' : '/api/auth/login';

        const res = await fetch(path, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre, email, password })
        });

        const data = await res.json();
        if (res.ok) {
            if (isReg) {
                // MENSAJE QUE NO SE QUITA RÁPIDO
                Swal.fire({ title: '¡Bienvenido!', text: 'Cuenta creada con éxito. Ahora inicia sesión.', icon: 'success', confirmButtonColor: '#0071e3' });
                toggleReg();
            } else {
                user = data;
                // MENSAJE DE BIENVENIDA AL ENTRAR
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: `Bienvenido, ${user.nombre}`, showConfirmButton: false, timer: 4000 });
                launchApp();
            }
        } else {
            Swal.fire('Error', data.message, 'error');
        }
    }

    function launchApp() {
        document.getElementById('auth-card').classList.add('hidden');
        document.getElementById('work-card').classList.remove('hidden');
        document.getElementById('top-nav').classList.remove('hidden');
        document.getElementById('user-welcome').innerText = "Hola, " + user.nombre;
        document.getElementById('nav-user').innerText = user.nombre;
        
        // MOSTRAR PANEL SOLO SI ES EL DUEÑO
        if (user.email === SUPER_ADMIN) {
            document.getElementById('admin-panel-btn').classList.remove('hidden');
        }
        loadHistory();
    }

    function startWork() {
        const task = document.getElementById('task-name').value;
        if (!task) return Swal.fire('Aviso', 'Escribe qué tarea vas a realizar.', 'info');
        
        startT = new Date();
        document.getElementById('setup-panel').classList.add('hidden');
        document.getElementById('timer-panel').classList.remove('hidden');
        document.getElementById('active-task').innerText = "TRABAJANDO EN: " + task;

        timerInt = setInterval(() => {
            const diff = new Date(new Date() - startT);
            document.getElementById('clock').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    async function stopWork() {
        clearInterval(timerInt);
        const duration = document.getElementById('clock').innerText;
        
        await fetch('/api/work/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                usuario_id: user.id, actividad: document.getElementById('task-name').value,
                inicio: startT.toLocaleTimeString(), fin: new Date().toLocaleTimeString(),
                fecha: new Date().toLocaleDateString(), duracion: duration
            })
        });

        document.getElementById('setup-panel').classList.remove('hidden');
        document.getElementById('timer-panel').classList.add('hidden');
        document.getElementById('clock').innerText = "00:00:00";
        document.getElementById('task-name').value = "";
        
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Registro guardado', showConfirmButton: false, timer: 3000 });
        loadHistory();
    }

    async function loadHistory(id = user.id) {
        const res = await fetch(`/api/work/history/${id}`);
        const data = await res.json();
        const today = new Date().toLocaleDateString();
        const filtered = data.filter(i => i.fecha === today);
        
        const list = document.getElementById('today-list');
        list.innerHTML = filtered.length === 0 ? '<p style="color:#86868b; margin-top:20px; font-style:italic;">No hay registros hoy.</p>' :
            filtered.map(i => `
                <div class="history-item">
                    <div><b>${i.actividad}</b><br><small>${i.hora_inicio}</small></div>
                    <div style="font-weight:800; color:var(--apple-blue);">${i.duracion_total}</div>
                </div>
            `).join('');
    }

    async function openAdmin() {
        document.getElementById('admin-modal').classList.remove('hidden');
        const res = await fetch(`/api/admin/all-users?requester=${user.email}`);
        const list = await res.json();
        
        document.getElementById('user-list-content').innerHTML = list.map(u => `
            <div class="user-row" onclick="openDetail(${u.id}, '${u.nombre}', '${u.email}')">
                <div><b>${u.nombre}</b><br><small>${u.email}</small></div>
                <div style="color:var(--apple-blue); font-size:18px;">➔</div>
            </div>
        `).join('');
    }

    async function openDetail(id, name, email) {
        document.getElementById('detail-modal').classList.remove('hidden');
        document.getElementById('det-user-name').innerText = name;
        document.getElementById('det-user-mail').innerText = email;
        
        const res = await fetch(`/api/work/history/${id}`);
        const data = await res.json();
        
        document.getElementById('det-history-content').innerHTML = data.length === 0 ? '<p>Sin actividad.</p>' :
            data.map(i => `
                <div class="history-item">
                    <div><b>${i.actividad}</b><br><small>${i.fecha} • ${i.hora_inicio}</small></div>
                    <div style="font-weight:800;">${i.duracion_total}</div>
                </div>
            `).join('');
    }

    function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
    function closeDetail() { document.getElementById('detail-modal').classList.add('hidden'); }
</script>
</body>
</html>
