<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Styles | Infinity Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        /* APPLE DESIGN SYSTEM - SEQUOIA EDITION */
        :root {
            --apple-blue: #0071e3; --apple-red: #ff3b30; --apple-green: #34c759;
            --glass: rgba(255, 255, 255, 0.72); --text: #1d1d1f; --sub: #86868b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, "SF Pro Display", sans-serif; }

        body { 
            background: #f5f5f7; color: var(--text); overflow-x: hidden; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* FONDO DINÁMICO DE PARTÍCULAS (DECORACIÓN EXTRA) */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }

        .hidden { display: none !important; }

        /* NAVEGACIÓN ESTILO MAC */
        nav {
            position: fixed; top: 0; width: 100%; height: 44px; z-index: 1000;
            backdrop-filter: blur(30px) saturate(200%); background: var(--glass);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex; justify-content: space-between; align-items: center; padding: 0 30px;
        }

        /* CONTENEDOR MAESTRO */
        .app-container { width: 100%; max-width: 480px; padding: 20px; z-index: 10; }

        /* TARJETA DE CRISTAL (GLASSMORPHISM) */
        .glass-card {
            background: rgba(255, 255, 255, 0.8); border-radius: 38px; padding: 50px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); text-align: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 40px 80px rgba(0,0,0,0.15); }

        h1 { font-size: 52px; font-weight: 800; letter-spacing: -3px; margin-bottom: 8px; line-height: 0.9; }
        .subtitle { color: var(--sub); font-size: 18px; margin-bottom: 40px; font-weight: 400; }

        /* CAMPOS DE ENTRADA TIPO IOS */
        .field { margin-bottom: 25px; text-align: left; }
        .field label { font-size: 12px; font-weight: 700; color: var(--apple-blue); margin-left: 15px; text-transform: uppercase; }
        
        input {
            width: 100%; padding: 20px; border-radius: 18px; border: 1px solid #d2d2d7;
            background: rgba(245,245,247,0.8); font-size: 17px; margin-top: 8px;
            transition: all 0.3s; outline: none;
        }
        input:focus { border-color: var(--apple-blue); background: #fff; box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15); }

        /* BOTONES DE LUJO */
        .btn-ios {
            width: 100%; padding: 20px; border-radius: 18px; border: none;
            background: var(--apple-blue); color: white; font-size: 17px; font-weight: 600;
            cursor: pointer; transition: 0.4s; box-shadow: 0 8px 20px rgba(0, 113, 227, 0.2);
        }
        .btn-ios:active { transform: scale(0.96); }

        /* BOTÓN DE ADMINISTRACIÓN (SOLO EMMANUEL) */
        .btn-admin-pill {
            background: #1d1d1f; color: #fff; margin-top: 30px; padding: 15px;
            border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer;
            border: none; width: 100%; animation: pulse 2s infinite;
        }

        /* CRONÓMETRO */
        .timer-display {
            background: #000; color: #fff; border-radius: 30px;
            padding: 60px 10px; margin: 35px 0; position: relative; overflow: hidden;
        }
        .timer-display::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 180deg, transparent, var(--apple-blue), transparent);
            animation: spin 5s linear infinite; opacity: 0.15;
        }
        .clock { font-size: 88px; font-weight: 800; letter-spacing: -5px; position: relative; z-index: 5; font-variant-numeric: tabular-nums; }

        /* LISTAS DE HISTORIAL */
        .log-item {
            background: #fff; border-radius: 20px; padding: 22px; margin-top: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(0,0,0,0.03); animation: slideInUp 0.6s ease;
        }

        .user-card-admin {
            background: #fff; padding: 25px; border-radius: 25px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(0,0,0,0.05); transition: 0.3s;
        }
        .user-card-admin:hover { transform: scale(1.02); }

        .btn-delete {
            background: rgba(255, 59, 48, 0.1); color: var(--apple-red);
            border: none; padding: 10px 18px; border-radius: 12px;
            font-size: 12px; font-weight: 800; cursor: pointer;
        }
        .btn-delete:hover { background: var(--apple-red); color: white; }

        /* MODALES PANTALLA COMPLETA */
        .admin-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f5f5f7; z-index: 2000; padding: 80px 25px; overflow-y: auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,0,0,0.1); } 70% { box-shadow: 0 0 0 10px rgba(0,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); } }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav id="nav-master" class="hidden">
    <div style="font-weight: 900; font-size: 18px; letter-spacing: -1px;">DIESEL STUDIO</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <span id="user-pill" style="font-size: 12px; font-weight: 800; color: var(--sub);"></span>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--apple-blue); font-weight:700; cursor:pointer;">Salir</button>
    </div>
</nav>

<div class="app-container">
    
    <div id="auth-section" class="glass-card animate__animated animate__fadeIn">
        <h1>Hola</h1>
        <p class="subtitle">Entra a la red Diesel Styles.</p>

        <div id="group-name" class="hidden field">
            <label>Nombre Completo</label>
            <input type="text" id="in-name" placeholder="Ej: Emmanuel Rodriguez">
        </div>

        <div class="field">
            <label>Correo Electrónico</label>
            <input type="email" id="in-email" placeholder="nombre@gmail.com">
        </div>

        <div class="field">
            <label>Contraseña</label>
            <input type="password" id="in-pass" placeholder="••••••••">
        </div>

        <button class="btn-ios" onclick="submitAuth()">Continuar</button>
        <button onclick="toggleMode()" id="mode-btn" style="background:none; border:none; color:var(--apple-blue); margin-top:30px; cursor:pointer; font-weight:600;">¿No tienes cuenta? Regístrate gratis</button>
    </div>

    <div id="dash-section" class="glass-card hidden animate__animated animate__fadeInUp">
        <div style="text-align: left; margin-bottom: 25px;">
            <h2 id="hello-user" style="font-size: 38px; font-weight: 800;">Hola</h2>
            <p id="status-txt" style="color:var(--sub);">¿Qué vamos a producir hoy?</p>
        </div>

        <div id="setup-controls">
            <div class="field">
                <label>Proyecto Actual</label>
                <input type="text" id="task-input" placeholder="Ej: Diseño de Logo Premium">
            </div>
            <button class="btn-ios" onclick="startTimer()">Iniciar Jornada</button>
            <button id="admin-panel-trigger" class="btn-admin-pill hidden" onclick="openAdmin()">Ver Cuentas y Control →</button>
        </div>

        <div id="timer-active" class="hidden">
            <div class="timer-display">
                <div id="active-label" style="font-size: 11px; font-weight: 900; color: var(--apple-blue); text-transform: uppercase; margin-bottom: 15px; position:relative; z-index:5;">Grabando Tiempo</div>
                <div class="clock" id="clock-display">00:00:00</div>
            </div>
            <button class="btn-ios" style="background:#000;" onclick="stopTimer()">Finalizar Trabajo</button>
        </div>

        <div style="text-align: left; margin-top: 50px;">
            <h3 style="font-size: 22px; font-weight: 800;">Actividad de Hoy</h3>
            <div id="history-container"></div>
        </div>
    </div>
</div>

<div id="admin-view" class="admin-view hidden animate__animated animate__slideInUp">
    <div style="max-width: 500px; margin: 0 auto;">
        <button onclick="closeAdmin()" style="background:none; border:none; color:var(--apple-blue); font-weight:700; cursor:pointer; font-size:18px;">← Panel de Usuario</button>
        <h1 style="margin-top:40px; font-size: 44px;">Cuentas</h1>
        <p class="subtitle">Administra los accesos de Diesel Styles.</p>
        <div id="user-list-target"></div>
    </div>
</div>

<div id="detail-view" class="admin-view hidden animate__animated animate__fadeIn">
    <div style="max-width: 500px; margin: 0 auto;">
        <button onclick="openAdmin()" style="background:none; border:none; color:var(--apple-blue); font-weight:700; cursor:pointer; font-size:18px;">← Lista de Cuentas</button>
        <h1 id="det-user-name" style="margin-top:40px;">Nombre</h1>
        <p id="det-user-email" class="subtitle"></p>
        <div id="det-history-target"></div>
    </div>
</div>

<script>
    const MASTER_ACCOUNT = 'emmanuel2013rq@gmail.com';
    let user = null; let isRegisterMode = false; let interval = null; let startT = null;

    // --- LÓGICA DE FONDO ANIMADO ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 5 + 1;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * 1 - 0.5;
        }
        update() { this.x += this.speedX; this.y += this.speedY; if (this.size > 0.2) this.size -= 0.01; }
        draw() { ctx.fillStyle = 'rgba(0,113,227,0.05)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
    function initBg() { for (let i = 0; i < 50; i++) particles.push(new Particle()); }
    function animateBg() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateBg); }
    initBg(); animateBg();

    // --- LÓGICA DE AUTENTICACIÓN ---
    function toggleMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('group-name').classList.toggle('hidden');
        document.getElementById('mode-btn').innerText = isRegisterMode ? "Ya tengo cuenta, entrar" : "¿No tienes cuenta? Regístrate gratis";
    }

    async function submitAuth() {
        const email = document.getElementById('in-email').value.toLowerCase().trim();
        const password = document.getElementById('in-pass').value;
        const nombre = document.getElementById('in-name').value;
        const path = isRegisterMode ? '/api/auth/register' : '/api/auth/login';

        const response = await fetch(path, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre, email, password })
        });

        const data = await response.json();
        if (response.ok) {
            if (isRegisterMode) {
                Swal.fire({ title: '¡Cuenta Lista!', text: 'Ahora puedes iniciar sesión con tus datos.', icon: 'success', confirmButtonColor: '#0071e3' });
                toggleMode();
            } else {
                user = data;
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: `Bienvenido, ${user.nombre}`, showConfirmButton: false, timer: 3500 });
                launchApp();
            }
        } else { Swal.fire('Atención', data.error, 'warning'); }
    }

    function launchApp() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('dash-section').classList.remove('hidden');
        document.getElementById('nav-master').classList.remove('hidden');
        document.getElementById('hello-user').innerText = "Hola, " + user.nombre.split(' ')[0];
        document.getElementById('user-pill').innerText = user.nombre;
        if (user.email === MASTER_ACCOUNT) document.getElementById('admin-panel-trigger').classList.remove('hidden');
        loadHistory();
    }

    // --- CRONÓMETRO ---
    function startTimer() {
        const task = document.getElementById('task-input').value;
        if (!task) return Swal.fire('Aviso', 'Escribe el nombre del proyecto.', 'info');
        
        startT = new Date();
        document.getElementById('setup-controls').classList.add('hidden');
        document.getElementById('timer-active').classList.remove('hidden');
        document.getElementById('status-txt').innerText = "Trabajando en: " + task;
        
        interval = setInterval(() => {
            const diff = new Date(new Date() - startT);
            document.getElementById('clock-display').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    async function stopTimer() {
        clearInterval(interval);
        const durationStr = document.getElementById('clock-display').innerText;
        const seconds = Math.floor((new Date() - startT) / 1000);

        await fetch('/api/work/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                uid: user.id, tarea: document.getElementById('task-input').value,
                inicio: startT.toLocaleTimeString(), fin: new Date().toLocaleTimeString(),
                fecha: new Date().toLocaleDateString(), duracion: durationStr, segs: seconds
            })
        });

        document.getElementById('setup-controls').classList.remove('hidden');
        document.getElementById('timer-active').classList.add('hidden');
        document.getElementById('status-txt').innerText = "¿Qué vamos a producir hoy?";
        document.getElementById('task-input').value = "";
        loadHistory();
    }

    async function loadHistory(id = user.id) {
        const res = await fetch(`/api/work/history/${id}`);
        const logs = await res.json();
        const today = new Date().toLocaleDateString();
        const todayLogs = logs.filter(l => l.fecha_registro === today);
        
        const container = document.getElementById('history-container');
        container.innerHTML = todayLogs.length === 0 ? '<p style="color:#86868b; margin-top:30px; font-style:italic;">No hay registros para hoy.</p>' :
            todayLogs.map(l => `
                <div class="log-item">
                    <div><b>${l.tarea}</b><br><small>${l.hora_entrada} - ${l.hora_salida}</small></div>
                    <div style="font-weight:800; color:var(--apple-blue);">${l.duracion_string}</div>
                </div>
            `).join('');
    }

    // --- FUNCIONES ADMINISTRATIVAS ---
    async function openAdmin() {
        document.getElementById('admin-view').classList.remove('hidden');
        document.getElementById('detail-view').classList.add('hidden');
        const res = await fetch(`/api/admin/users?auth=${user.email}`);
        const users = await res.json();
        
        document.getElementById('user-list-target').innerHTML = users.map(u => `
            <div class="user-card-admin">
                <div style="cursor:pointer;" onclick="inspectUser(${u.id}, '${u.nombre}', '${u.email}')">
                    <b>${u.nombre}</b><br><small>${u.email}</small>
                </div>
                <button class="btn-delete" onclick="deleteUser(${u.id}, '${u.nombre}')">Eliminar</button>
            </div>
        `).join('');
    }

    async function deleteUser(id, name) {
        const result = await Swal.fire({
            title: `¿Eliminar a ${name}?`,
            text: "Se borrarán permanentemente su cuenta y todos sus registros de tiempo.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff3b30',
            confirmButtonText: 'Sí, eliminar cuenta'
        });

        if (result.isConfirmed) {
            await fetch(`/api/admin/user/${id}?auth=${user.email}`, { method: 'DELETE' });
            Swal.fire('Eliminado', 'La cuenta ha sido purgada.', 'success');
            openAdmin();
        }
    }

    async function inspectUser(id, name, email) {
        document.getElementById('admin-view').classList.add('hidden');
        document.getElementById('detail-view').classList.remove('hidden');
        document.getElementById('det-user-name').innerText = name;
        document.getElementById('det-user-email').innerText = email;
        const res = await fetch(`/api/work/history/${id}`);
        const logs = await res.json();
        
        document.getElementById('det-history-target').innerHTML = logs.length === 0 ? '<p>Sin historial registrado.</p>' :
            logs.map(l => `
                <div class="log-item">
                    <div><b>${l.tarea}</b><br><small>${l.fecha_registro} • ${l.hora_entrada}</small></div>
                    <div style="font-weight:800;">${l.duracion_string}</div>
                </div>
            `).join('');
    }

    function closeAdmin() { document.getElementById('admin-view').classList.add('hidden'); }
</script>
</body>
</html>
