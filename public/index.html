<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workstation Pro | Apple Experience</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <style>
        :root {
            --blue: #007AFF;
            --gray: #F2F2F7;
            --dark: #1C1C1E;
            --glass: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; }

        body { 
            background: #E5E5EA;
            background-image: radial-gradient(circle at 20% 30%, #D1D1D6 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, #E5E5EA 0%, transparent 40%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .hidden { display: none !important; }

        /* Contenedor Grande (Canvas Pro) */
        .apple-canvas {
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(210%);
            width: 90%; max-width: 900px;
            min-height: 600px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 40px 100px rgba(0,0,0,0.12);
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
        }

        /* Header */
        .canvas-header {
            padding: 30px 40px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .canvas-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -1px; }

        /* Contenido Dinámico */
        .view { flex-grow: 1; padding: 40px; overflow-y: auto; position: relative; }

        /* Inputs Estilo Minimal */
        .field { margin-bottom: 25px; }
        label { font-size: 13px; font-weight: 600; color: #8E8E93; display: block; margin-bottom: 8px; }
        input {
            width: 100%; padding: 16px 20px; border-radius: 16px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.5); font-size: 17px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }

        /* Botones Pro */
        .btn {
            padding: 16px 28px; border-radius: 16px; border: none; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: 0.3s; 
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        .btn-blue:hover { opacity: 0.9; transform: scale(0.99); }
        .btn-secondary { background: rgba(0,0,0,0.05); color: var(--blue); margin-top: 15px; width: 100%; }

        /* Cronómetro Gigante */
        .timer-display {
            font-size: 100px; font-weight: 800; letter-spacing: -5px; margin: 40px 0;
            font-variant-numeric: tabular-nums; color: var(--dark);
        }

        /* Tablas y Listas */
        .data-row {
            background: rgba(255,255,255,0.4); padding: 20px; border-radius: 20px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid rgba(0,0,0,0.02); transition: 0.2s;
        }
        .data-row:hover { background: white; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.03); }

        /* Sub-páginas Animadas */
        .sub-view {
            position: absolute; inset: 0; background: #F2F2F7; padding: 40px; z-index: 100;
            display: flex; flex-direction: column;
        }
    </style>
</head>
<body>

<div class="apple-canvas animate__animated animate__fadeInUp">
    <div class="canvas-header">
        <div id="h-left" style="display:flex; align-items:center; gap:15px;">
            <div style="width:12px; height:12px; border-radius:50%; background:#FF5F57;"></div>
            <div style="width:12px; height:12px; border-radius:50%; background:#FFBD2E;"></div>
            <div style="width:12px; height:12px; border-radius:50%; background:#28C840;"></div>
            <span id="title-txt" style="margin-left:10px; font-weight:700; opacity:0.8;">Control Center</span>
        </div>
        <div id="h-right">
            <button onclick="logout()" id="logout-btn" class="hidden" style="background:none; border:none; color:#FF3B30; font-weight:600; cursor:pointer;">Cerrar Sesión</button>
        </div>
    </div>

    <div id="view-auth" class="view">
        <div style="max-width:350px; margin: 40px auto; text-align: center;">
            <h1 style="font-size:35px; margin-bottom:10px;">Bienvenido</h1>
            <p style="color:#8E8E93; margin-bottom:30px;">Ingresa tus datos para empezar</p>
            
            <div id="reg-box" class="hidden">
                <div class="field"><label>Nombre</label><input type="text" id="reg-name"></div>
            </div>
            <div class="field"><label>Email</label><input type="email" id="log-email"></div>
            <div class="field"><label>Password</label><input type="password" id="log-pass"></div>
            
            <button class="btn btn-blue" onclick="auth()">Entrar</button>
            <button class="btn btn-secondary" style="background:none;" onclick="toggleAuth()" id="toggle-btn">¿No tienes cuenta? Regístrate</button>
        </div>
    </div>

    <div id="view-dash" class="view hidden">
        <div style="max-width:500px; margin: 0 auto; text-align: center;">
            <h2 id="welcome-txt" style="font-size:40px; letter-spacing:-1.5px;">Hola</h2>
            <p style="color:#8E8E93; margin-bottom:40px;">¿Qué vamos a registrar hoy?</p>

            <div id="setup-task">
                <div class="field">
                    <label>Nombre del Proyecto</label>
                    <input type="text" id="task-input" placeholder="Ej: Voy a hacer una iglesia">
                </div>
                <button class="btn btn-blue" onclick="startClock()"><i class="fa fa-play"></i> Iniciar Jornada</button>
                <button class="btn btn-secondary" onclick="showMyTasks()"><i class="fa fa-list-check"></i> Ver Mis Tareas</button>
                <button id="admin-p" class="btn hidden" style="margin-top:15px; background:black; color:white; width:100%;" onclick="showAdmin()">
                    <i class="fa fa-shield"></i> Administración
                </button>
            </div>

            <div id="active-task" class="hidden">
                <div class="timer-display" id="chrono">00:00:00</div>
                <button class="btn btn-blue" style="background:#FF3B30;" onclick="stopClock()">
                    <i class="fa fa-stop"></i> Finalizar y Guardar
                </button>
            </div>
        </div>
    </div>

    <div id="view-mytasks" class="sub-view hidden animate__animated animate__slideInRight">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1 style="font-size:32px;">Mis Tareas</h1>
            <button onclick="closeSub('view-mytasks')" class="btn" style="background:#E5E5EA; color:#000; width:auto; padding:10px 20px;">Cerrar</button>
        </div>
        <div id="mytasks-list" style="overflow-y:auto;"></div>
    </div>

    <div id="view-admin" class="sub-view hidden animate__animated animate__slideInRight">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h1 style="font-size:32px;">Panel Auditoría</h1>
            <button onclick="closeSub('view-admin')" class="btn" style="background:#E5E5EA; color:#000; width:auto; padding:10px 20px;">Cerrar</button>
        </div>
        <div id="admin-user-list" style="overflow-y:auto;"></div>
    </div>
</div>

<script>
    const MASTER = 'emmanuel2013rq@gmail.com';
    let user = null;
    let isReg = false;
    let timer = null;
    let startTime = null;

    function toggleAuth() {
        isReg = !isReg;
        document.getElementById('reg-box').classList.toggle('hidden');
        document.getElementById('toggle-btn').innerText = isReg ? 'Ya tengo cuenta' : '¿No tienes cuenta? Regístrate';
    }

    async function auth() {
        const email = document.getElementById('log-email').value;
        const password = document.getElementById('log-pass').value;
        const nombre = document.getElementById('reg-name').value;
        const path = isReg ? '/api/auth/register' : '/api/auth/login';

        const r = await fetch(path, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre, email, password })
        });
        const d = await r.json();
        if (r.ok) {
            if (isReg) { Swal.fire('Éxito', 'Cuenta lista', 'success'); toggleAuth(); }
            else { user = d; localStorage.setItem('inf_session', JSON.stringify(d)); goDash(); }
        } else { Swal.fire('Error', d.error, 'error'); }
    }

    function goDash() {
        document.getElementById('view-auth').classList.add('hidden');
        document.getElementById('view-dash').classList.remove('hidden');
        document.getElementById('logout-btn').classList.remove('hidden');
        document.getElementById('welcome-txt').innerText = "Hola, " + user.nombre;
        if (user.email === MASTER) document.getElementById('admin-p').classList.remove('hidden');
    }

    function startClock() {
        if (!document.getElementById('task-input').value) return Swal.fire('Aviso', 'Indica el proyecto', 'info');
        startTime = new Date();
        document.getElementById('setup-task').classList.add('hidden');
        document.getElementById('active-task').classList.remove('hidden');
        timer = setInterval(() => {
            const diff = new Date(new Date() - startTime);
            document.getElementById('chrono').innerText = diff.toISOString().substr(11, 8);
        }, 1000);
    }

    async function stopClock() {
        clearInterval(timer);
        const duracion = document.getElementById('chrono').innerText;
        const proyecto = document.getElementById('task-input').value;
        await fetch('/api/tiempo/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ usuario_id: user.id, proyecto, duracion })
        });
        Swal.fire('Guardado', 'Tarea registrada con éxito', 'success').then(() => location.reload());
    }

    async function showMyTasks() {
        document.getElementById('view-mytasks').classList.remove('hidden');
        const r = await fetch(`/api/tareas/mias?uid=${user.id}`);
        const data = await r.json();
        const box = document.getElementById('mytasks-list');
        box.innerHTML = data.map(t => `
            <div class="data-row">
                <div><b style="font-size:18px">${t.proyecto}</b><br><small style="color:#8E8E93">${t.fecha}</small></div>
                <div style="font-size:22px; font-weight:700; color:var(--blue)">${t.duracion}</div>
            </div>
        `).join('') || '<p>Aún no tienes tareas registradas.</p>';
    }

    async function showAdmin() {
        document.getElementById('view-admin').classList.remove('hidden');
        const r = await fetch(`/api/admin/usuarios?admin_email=${user.email}`);
        const list = await r.json();
        const box = document.getElementById('admin-user-list');
        box.innerHTML = list.map(u => `
            <div class="data-row">
                <div><b>${u.nombre}</b><br><small>${u.email}</small></div>
                <button onclick="delUser(${u.id})" class="btn" style="background:none; color:#FF3B30; width:auto; padding:0 10px;"><i class="fa fa-trash"></i></button>
            </div>
        `).join('');
    }

    async function delUser(id) {
        const confirm = await Swal.fire({title:'¿Eliminar?', showCancelButton:true});
        if (confirm.isConfirmed) {
            await fetch(`/api/admin/usuarios/${id}?admin_email=${user.email}`, {method:'DELETE'});
            showAdmin();
        }
    }

    function closeSub(id) { document.getElementById(id).classList.add('hidden'); }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        const s = localStorage.getItem('inf_session');
        if (s) { user = JSON.parse(s); goDash(); }
    };
</script>
</body>
</html>
